<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🏥 PaedsWard – المتكامل النهائي</title>
  <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22PaedsWard%22%2C%22short_name%22%3A%22PaedsWard%22%2C%22start_url%22%3A%22.%2Findex.html%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f0f4f8%22%2C%22theme_color%22%3A%22%231a73e8%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20100%20100'%3E%3Ccircle%20cx%3D'50'%20cy%3D'50'%20r%3D'45'%20fill%3D'%231a73e8'%2F%3E%3Ctext%20x%3D'50'%20y%3D'65'%20font-size%3D'40'%20text-anchor%3D'middle'%20fill%3D'white'%3E%2B%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22100x100%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
  <script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
  <style>
    /* ===== نظام التصميم المتقدم ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1a73e8; --primary-dark: #0b3d91; --primary-light: #e8f0fe;
      --secondary: #6c63ff; --success: #22c55e; --danger: #e53935;
      --warning: #f59e0b; --info: #06b6d4; --gray: #94a3b8; --dark: #1e293b;
      --font-family: 'Cairo', 'Segoe UI', system-ui, sans-serif;
      --font-size-base: 14px; --font-size-large: 18px; --font-size-small: 12px;
      --spacing-xs: 4px; --spacing-sm: 8px; --spacing-md: 16px; --spacing-lg: 24px; --spacing-xl: 32px;
      --radius: 16px; --shadow: 0 4px 20px rgba(0,0,0,0.08); --transition: 0.3s ease;
    }
    body {
      font-family: var(--font-family);
      background: #f1f5f9;
      touch-action: manipulation;
      color: var(--dark);
      direction: rtl;
      font-size: var(--font-size-base);
      line-height: 1.6;
    }
    .app {
      max-width: 500px;
      margin: 0 auto;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 40px rgba(0,0,0,0.06);
      position: relative;
    }
    @media (min-width: 501px) {
      .app { max-width: 600px; min-height: 90vh; height: 95vh; border-radius: 24px; margin: 20px auto; }
      body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #dce3ed; }
    }
    @media (min-width: 768px) {
      .app { max-width: 900px; }
      .app .drawer-toggle { display: flex !important; }
      .app .tab-bar { display: none !important; }
      .app .drawer { transform: translateX(0) !important; width: 220px; }
      .app .main-content { margin-right: 220px; }
    }

    /* ─── Offline Mode ─── */
    .offline-banner {
      background: var(--danger);
      color: white;
      padding: 4px 12px;
      text-align: center;
      font-size: var(--font-size-small);
      font-weight: 600;
      display: none;
    }
    .offline-banner.visible { display: block; }

    /* ─── Header ─── */
    header {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      color: white;
      padding: var(--spacing-md) var(--spacing-lg);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 0 0 24px 24px;
      position: sticky;
      top: 0;
      z-index: 30;
      flex-shrink: 0;
      flex-wrap: wrap;
      gap: var(--spacing-sm);
    }
    header .brand { font-size: var(--font-size-large); font-weight: 800; }
    header .brand small { font-weight: 400; font-size: var(--font-size-small); opacity: 0.8; }
    .header-actions {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      flex-wrap: wrap;
    }
    .header-actions select {
      background: rgba(255,255,255,0.18);
      color: white;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 30px;
      padding: 4px 12px;
      font-size: var(--font-size-small);
      font-weight: 500;
      cursor: pointer;
      outline: none;
      direction: rtl;
      backdrop-filter: blur(4px);
    }
    .header-actions select option { background: var(--dark); color: white; }
    .header-actions button {
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: var(--font-size-small);
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }
    .header-actions button:active { transform: scale(0.95); }
    #adminBtn { background: #fbbf24; color: var(--dark); display: none; }
    #adminBtn.visible { display: inline-block; }
    .drawer-toggle {
      display: none;
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 18px;
      cursor: pointer;
    }
    .sync-status {
      font-size: var(--font-size-small);
      background: rgba(255,255,255,0.15);
      padding: 2px 10px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .sync-status .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
    .sync-status .dot.online { background: #4ade80; }
    .sync-status .dot.offline { background: #f87171; }

    /* ─── Drawer (قائمة جانبية) ─── */
    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: 280px;
      height: 100%;
      background: white;
      z-index: 40;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      box-shadow: -4px 0 20px rgba(0,0,0,0.1);
      padding: var(--spacing-md);
      overflow-y: auto;
    }
    .drawer.open { transform: translateX(0); }
    .drawer .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: var(--spacing-md);
      border-bottom: 1px solid #e2e8f0;
      margin-bottom: var(--spacing-md);
    }
    .drawer .drawer-header h3 { font-size: var(--font-size-base); }
    .drawer .drawer-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--gray);
    }
    .drawer .drawer-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      padding: var(--spacing-sm) var(--spacing-md);
      border-radius: 8px;
      cursor: pointer;
      transition: var(--transition);
      color: var(--dark);
      text-decoration: none;
      font-size: var(--font-size-base);
    }
    .drawer .drawer-item:hover { background: var(--primary-light); }
    .drawer .drawer-item.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
    .drawer .drawer-item .badge {
      background: var(--danger);
      color: white;
      border-radius: 30px;
      padding: 0px 6px;
      font-size: 10px;
      font-weight: 700;
      margin-right: auto;
    }

    .drawer-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.3);
      z-index: 35;
      display: none;
    }
    .drawer-overlay.visible { display: block; }

    /* ─── Search Bar ─── */
    .search-bar {
      padding: var(--spacing-sm) var(--spacing-md);
      background: #ffffff;
      border-bottom: 1px solid #e2e8f0;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .search-bar input {
      width: 100%;
      padding: var(--spacing-sm) var(--spacing-md);
      border: 1.5px solid #e2e8f0;
      border-radius: 30px;
      font-size: var(--font-size-base);
      background: #f8fafc;
      outline: none;
      transition: var(--transition);
      font-family: var(--font-family);
    }
    .search-bar input:focus {
      border-color: var(--primary);
      background: white;
      box-shadow: 0 0 0 3px rgba(26,115,232,0.15);
    }

    /* ─── Dashboard ─── */
    .dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-md);
    }
    .dashboard .stat-card {
      background: white;
      border-radius: var(--radius);
      padding: var(--spacing-md);
      box-shadow: var(--shadow);
      border-right: 4px solid var(--primary);
      text-align: center;
    }
    .dashboard .stat-card .stat-number { font-size: 28px; font-weight: 800; }
    .dashboard .stat-card .stat-label { font-size: var(--font-size-small); color: var(--gray); }
    .dashboard .stat-card.primary { border-right-color: var(--primary); }
    .dashboard .stat-card.success { border-right-color: var(--success); }
    .dashboard .stat-card.warning { border-right-color: var(--warning); }
    .dashboard .stat-card.danger { border-right-color: var(--danger); }
    .dashboard .stat-card.secondary { border-right-color: var(--secondary); }

    /* ─── Tab Bar ─── */
    .tab-bar {
      display: flex;
      background: white;
      border-top: 1px solid #e2e8f0;
      position: sticky;
      bottom: 0;
      z-index: 15;
      flex-shrink: 0;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: var(--spacing-sm) var(--spacing-xs) var(--spacing-xs);
      font-size: var(--font-size-small);
      color: var(--gray);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: var(--transition);
      user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      position: relative;
    }
    .tab .tab-icon { font-size: 20px; }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); background: var(--primary-light); }
    .badge {
      position: absolute;
      top: 2px;
      right: 8px;
      background: var(--danger);
      color: white;
      border-radius: 30px;
      padding: 0px 6px;
      font-size: 9px;
      font-weight: 700;
      display: none;
      min-width: 18px;
      text-align: center;
    }

    /* ─── Content ─── */
    .main-content {
      flex: 1;
      padding: var(--spacing-md);
      overflow-y: auto;
      background: #f8fafc;
    }

    /* ─── Cards ─── */
    .card {
      background: white;
      border-radius: var(--radius);
      padding: var(--spacing-md);
      margin-bottom: var(--spacing-sm);
      box-shadow: var(--shadow);
      border-right: 4px solid var(--primary);
      transition: var(--transition);
      cursor: default;
    }
    .card.clickable { cursor: pointer; }
    .card.clickable:active { transform: scale(0.98); }
    .card .title { font-weight: 700; font-size: var(--font-size-base); }
    .card .sub { color: var(--gray); font-size: var(--font-size-small); }
    .card .meta {
      display: flex;
      flex-wrap: wrap;
      gap: var(--spacing-xs) var(--spacing-sm);
      margin-top: var(--spacing-xs);
      font-size: var(--font-size-small);
    }
    .card .actions {
      margin-top: var(--spacing-sm);
      display: flex;
      gap: var(--spacing-xs);
      flex-wrap: wrap;
    }
    .card .urgent-badge { background: var(--danger); color: white; padding: 1px 8px; border-radius: 30px; font-size: 10px; font-weight: 700; }
    .card .done-badge { background: var(--success); color: white; padding: 1px 8px; border-radius: 30px; font-size: 10px; font-weight: 700; }
    .status-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 30px;
      font-size: var(--font-size-small);
      font-weight: 600;
    }
    .status-badge.admitted { background: #dbeafe; color: #1a56db; }
    .status-badge.discharged { background: #d1fae5; color: #065f46; }
    .status-badge.waiting { background: #fef3c7; color: #92400e; }
    .status-badge.completed { background: #d1fae5; color: #065f46; }
    .status-badge.critical { background: #fee2e2; color: #b91c1c; }
    .status-badge.stable { background: #dbeafe; color: #1a56db; }
    .status-badge.monitoring { background: #fef3c7; color: #92400e; }
    .status-badge.intervention { background: #fce4ec; color: #c62828; }
    .tag {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 600;
      background: #e2e8f0;
    }
    .tag.high { background: #fee2e2; color: #b91c1c; }
    .tag.medium { background: #fef3c7; color: #92400e; }
    .tag.low { background: #dbeafe; color: #1a56db; }
    .tag.overdue { background: #fee2e2; color: #b91c1c; border: 1px solid #b91c1c; }
    .tag.soon { background: #fef3c7; color: #92400e; }

    /* ─── Buttons ─── */
    button {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: var(--font-size-base);
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      touch-action: manipulation;
    }
    button:active { transform: scale(0.96); }
    button.secondary { background: var(--primary-light); color: var(--primary); }
    button.danger { background: var(--danger); color: white; }
    button.success { background: var(--success); color: white; }
    button.warning { background: var(--warning); color: white; }
    button.small { padding: 4px 12px; font-size: var(--font-size-small); }
    button.block { width: 100%; justify-content: center; margin: 4px 0; }
    button.gold { background: #fbbf24; color: var(--dark); }

    /* ─── Forms ─── */
    input, textarea, select.form-input {
      width: 100%;
      padding: 10px 14px;
      margin: 4px 0 10px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: var(--font-size-base);
      background: #f8fafc;
      outline: none;
      font-family: var(--font-family);
      direction: rtl;
      transition: var(--transition);
    }
    input:focus, textarea:focus, select.form-input:focus {
      border-color: var(--primary);
      background: white;
      box-shadow: 0 0 0 3px rgba(26,115,232,0.1);
    }
    textarea { min-height: 80px; resize: vertical; }
    label { font-size: var(--font-size-small); font-weight: 600; color: #475569; display: block; margin-top: 6px; }
    .check-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 400;
      font-size: var(--font-size-base);
      cursor: pointer;
      margin: 4px 0;
    }
    .check-label input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-sm); }
    .form-row .full { grid-column: 1 / -1; }

    /* ─── Wizard (خطوات النموذج) ─── */
    .wizard-step { display: none; }
    .wizard-step.active { display: block; }
    .wizard-progress {
      display: flex;
      justify-content: space-between;
      margin-bottom: var(--spacing-md);
      position: relative;
    }
    .wizard-progress::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 2px;
      background: #e2e8f0;
      transform: translateY(-50%);
      z-index: 0;
    }
    .wizard-progress .step-indicator {
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 1;
      background: white;
      padding: 0 4px;
    }
    .wizard-progress .step-indicator .step-circle {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 2px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: var(--font-size-small);
      background: white;
      color: var(--gray);
      transition: var(--transition);
    }
    .wizard-progress .step-indicator .step-circle.active {
      border-color: var(--primary);
      background: var(--primary);
      color: white;
    }
    .wizard-progress .step-indicator .step-circle.done {
      border-color: var(--success);
      background: var(--success);
      color: white;
    }
    .wizard-progress .step-indicator .step-label {
      font-size: 10px;
      color: var(--gray);
      margin-top: 4px;
    }

    /* ─── Modal ─── */
    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(15,23,42,0.6);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: var(--spacing-md);
    }
    .modal-content {
      background: white;
      border-radius: 24px;
      padding: var(--spacing-lg);
      width: 100%;
      max-width: 500px;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      animation: modalSlide 0.3s ease;
    }
    @keyframes modalSlide { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-content h2 { font-size: 22px; margin-bottom: var(--spacing-md); display: flex; align-items: center; gap: 8px; }
    .modal-content h3 { font-size: var(--font-size-base); margin: var(--spacing-md) 0 var(--spacing-sm); color: #475569; }
    .hidden { display: none !important; }

    /* ─── Snapshot Tabs ─── */
    .snapshot-tabs {
      display: flex;
      flex-wrap: wrap;
      border-bottom: 2px solid #e2e8f0;
      margin-bottom: var(--spacing-md);
      gap: 2px;
    }
    .snapshot-tab {
      padding: 6px 14px;
      cursor: pointer;
      font-size: var(--font-size-small);
      font-weight: 500;
      color: var(--gray);
      border-bottom: 3px solid transparent;
      transition: var(--transition);
      border-radius: 6px 6px 0 0;
    }
    .snapshot-tab.active { color: var(--primary); border-bottom-color: var(--primary); background: var(--primary-light); }

    /* ─── Empty State ─── */
    .empty-state { text-align: center; padding: 40px 16px; color: var(--gray); }
    .empty-state .emoji { font-size: 40px; }
    .empty-state p { font-size: var(--font-size-base); }

    /* ─── Utilities ─── */
    .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: var(--spacing-sm); }
    .text-muted { color: var(--gray); font-size: var(--font-size-small); }
    .text-sm { font-size: var(--font-size-small); }
    .mt-8 { margin-top: var(--spacing-sm); }
    .mb-8 { margin-bottom: var(--spacing-sm); }

    /* ─── Toast ─── */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--dark);
      color: white;
      padding: 10px 24px;
      border-radius: 30px;
      font-size: var(--font-size-base);
      font-weight: 500;
      z-index: 200;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      max-width: 90%;
      text-align: center;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

    /* ─── Charts ─── */
    .chart-wrap { background: #f8fafc; border-radius: 12px; padding: var(--spacing-sm); margin: var(--spacing-sm) 0; text-align: center; }
    .chart-wrap canvas { max-width: 100%; height: auto; }

    /* ─── Team ─── */
    .member-list { display: flex; flex-wrap: wrap; gap: var(--spacing-xs); margin: var(--spacing-sm) 0; }
    .member-list .member { background: var(--primary-light); padding: 4px 14px; border-radius: 30px; font-size: var(--font-size-small); display: flex; align-items: center; gap: 4px; }
    .role-tag { display: inline-block; padding: 1px 8px; border-radius: 30px; font-size: 10px; font-weight: 600; background: var(--primary-light); color: var(--primary); }

    .message { background: white; padding: var(--spacing-sm) var(--spacing-md); border-radius: 12px; margin-bottom: 4px; border-right: 3px solid #8b5cf6; }
    .message .sender { font-weight: 700; font-size: var(--font-size-small); }
    .message .time { color: var(--gray); font-size: 10px; }
    .message .text { font-size: var(--font-size-base); margin-top: 2px; }

    /* ─── Scrollbar ─── */
    .main-content::-webkit-scrollbar { width: 4px; }
    .main-content::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
    .main-content::-webkit-scrollbar-track { background: transparent; }

    /* ─── Lazy Loading ─── */
    .lazy-loader {
      text-align: center;
      padding: var(--spacing-md);
      color: var(--gray);
      font-size: var(--font-size-small);
    }
    .lazy-loader .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid #e2e8f0;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="app" id="app">
  <!-- Offline Banner -->
  <div class="offline-banner" id="offlineBanner">⚠️ وضع غير متصل – سيتم المزامنة تلقائياً عند عودة الاتصال</div>

  <!-- Drawer Overlay -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="toggleDrawer()"></div>

  <!-- Drawer (قائمة جانبية) -->
  <div class="drawer" id="drawer">

    <div class="tab" data-tab="clinic" onclick="showTab('clinic')">
      <span class="tab-icon">🩺</span><span>العيادة</span>

      <span class="tab-icon">📋</span><span>المهام</span>
      <span class="badge" id="taskBadge">0</span>
    </div>
    <div class="tab" data-tab="team" onclick="showTab('team')">
      <span class="tab-icon">👥</span><span>الفريق</span>
      <span class="badge" id="teamBadge">0</span>
    </div>
    <div class="tab" data-tab="handover" onclick="showTab('handover')">
      <span class="tab-icon">📝</span><span>التسليم</span>
      <span class="badge" id="handoverBadge">0</span>

      <span class="tab-icon">📊</span><span>التقارير</span>

</div>

<!-- Modal -->
<div id="modal" class="modal hidden" onclick="closeModalOverlay(event)">
  <div class="modal-content" id="modalContent" onclick="event.stopPropagation()"></div>
</div>
<script>
// ================================================================
//  التطبيق المتكامل – الإصدار PRO (مع كل التحسينات)
// ================================================================

const store = localforage.createInstance({ name: 'PaedsWard', storeName: 'state' });

let state = {
  patients: [], tasks: [], handovers: [], clinicSlots: [],
  teamMembers: [
    { id: 'u1', name: 'د. أحمد', role: 'senior' },
    { id: 'u2', name: 'د. سارة', role: 'junior' },
    { id: 'u3', name: 'م. ليلى', role: 'nurse' }
  ],
  teamMessages: [],
  currentRole: 'senior',
  lastSync: Date.now(),
  auditLog: [],
  searchQuery: '',
  isOffline: false,
  pendingChanges: []
};

let currentTab = 'ward';
let selectedPatient = null;
let snapshotTab = 'overview';
let isSyncing = false;
let retryTimer = null;
let syncDebounce = null;
let notificationPermission = false;

// Lazy Loading
let displayedCount = 10;
const PAGE_SIZE = 10;

// ─── تحميل البيانات ───
async function loadState() {
  try {
    const saved = await store.getItem('state');
    if (saved) {
      state = { ...state, ...saved };
      return true;
    }
  } catch (e) { console.warn('⚠️ فشل التحميل:', e); }
  return false;
}

async function saveState() {
  try {
    await store.setItem('state', state);
    syncDelayed();
  } catch (e) { console.warn('⚠️ فشل الحفظ:', e); }
}

function addAuditLog(action, details) {
  state.auditLog.push({
    timestamp: new Date().toISOString(),
    user: state.currentRole,
    action, details,
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 4)
  });
  if (state.auditLog.length > 100) state.auditLog = state.auditLog.slice(-100);
}

// ─── المزامنة الذكية ───
async function syncToServer() {
  if (isSyncing) return;
  isSyncing = true;
  try {
    const resp = await fetch('/api/state');
    if (resp.ok) {
      const serverData = await resp.json();
      for (const key of ['patients','tasks','handovers','clinicSlots','teamMembers','teamMessages']) {
        if (serverData[key] && serverData[key].length > 0) {
          const localMap = {};
          state[key].forEach(item => { localMap[item.id] = item; });
          serverData[key].forEach(serverItem => {
            const localItem = localMap[serverItem.id];
            if (!localItem || (serverItem.updatedAt||0) > (localItem.updatedAt||0)) {
              state[key] = state[key].filter(i => i.id !== serverItem.id);
              state[key].push(serverItem);
            }
          });
          for (const localItem of state[key]) {
            const serverItem = serverData[key].find(s => s.id === localItem.id);
            if (!serverItem || (localItem.updatedAt||0) > (serverItem.updatedAt||0)) {
              await fetch(`/api/${key}/${localItem.id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(localItem)
              });
            }
          }
        } else {
          for (const item of state[key]) {
            await fetch(`/api/${key}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(item)
            });
          }
        }
      }
      state.lastSync = Date.now();
      state.isOffline = false;
      document.getElementById('offlineBanner').classList.remove('visible');
      await saveState();
      updateSyncStatus(true);
      showToast('🔄 تمت المزامنة مع الخادم');
    }
  } catch (e) {
    state.isOffline = true;
    document.getElementById('offlineBanner').classList.add('visible');
    updateSyncStatus(false);
    console.warn('⚠️ الخادم غير متاح:', e.message);
    if (retryTimer) clearTimeout(retryTimer);
    retryTimer = setTimeout(syncToServer, 30000);
  } finally {
    isSyncing = false;
  }
}

function syncDelayed() {
  if (syncDebounce) clearTimeout(syncDebounce);
  syncDebounce = setTimeout(() => {
    syncToServer();
    syncDebounce = null;
  }, 3000);
}

function updateSyncStatus(online) {
  const dot = document.getElementById('syncDot');
  const label = document.getElementById('syncLabel');
  if (online) {
    dot.className = 'dot online';
    label.textContent = 'متصل';
  } else {
    dot.className = 'dot offline';
    label.textContent = 'محلي';
  }
}

// ─── أدوات مساعدة ───
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function today() { return new Date().toISOString().split('T')[0]; }
function timeNow() { return new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' }); }

function getRoleLabel(role) {
  const map = { senior: 'استشاري', junior: 'مبتدئ', nurse: 'ممرض', admin: 'إداري' };
  return map[role] || role;
}
function getRoleEmoji(role) {
  const map = { senior: '👨‍⚕️', junior: '🧑‍⚕️', nurse: '👩‍⚕️', admin: '📋' };
  return map[role] || '👤';
}
function can(roles) { return roles.includes(state.currentRole); }

function showToast(msg) {
  const old = document.querySelector('.toast');
  if (old) old.remove();
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3000);
}

function openModal(html) {
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('modalContent').innerHTML = html;
}
function closeModal() { document.getElementById('modal').classList.add('hidden'); }
function closeModalOverlay(e) { if (e.target === document.getElementById('modal')) closeModal(); }

// ─── Drawer ───
function toggleDrawer() {
  const drawer = document.getElementById('drawer');
  const overlay = document.getElementById('drawerOverlay');
  drawer.classList.toggle('open');
  overlay.classList.toggle('visible');
}

// ─── البحث العالمي ───
function searchGlobal(query) {
  state.searchQuery = query.toLowerCase();
  displayedCount = PAGE_SIZE;
  render();
}

function filterBySearch(items, searchFields) {
  if (!state.searchQuery) return items;
  return items.filter(item => {
    return searchFields.some(field => {
      const val = item[field];
      return val && val.toString().toLowerCase().includes(state.searchQuery);
    });
  });
}

// ─── تحديث الشارات ───
function updateBadges() {
  const pending = state.tasks.filter(t => !t.done && (t.assignee === state.currentRole || state.currentRole === 'senior')).length;
  document.getElementById('taskBadge').style.display = pending ? 'block' : 'none';
  document.getElementById('taskBadge').textContent = pending;
  document.getElementById('drawerTaskBadge').style.display = pending ? 'block' : 'none';
  document.getElementById('drawerTaskBadge').textContent = pending;
  
  const urgent = state.handovers.filter(h => h.urgent && !h.acknowledged).length;
  document.getElementById('handoverBadge').style.display = urgent ? 'block' : 'none';
  document.getElementById('handoverBadge').textContent = urgent;
  document.getElementById('drawerHandoverBadge').style.display = urgent ? 'block' : 'none';
  document.getElementById('drawerHandoverBadge').textContent = urgent;
  
  const unread = state.teamMessages.filter(m => !m.read).length;
  document.getElementById('teamBadge').style.display = unread ? 'block' : 'none';
  document.getElementById('teamBadge').textContent = unread;
  document.getElementById('drawerTeamBadge').style.display = unread ? 'block' : 'none';
  document.getElementById('drawerTeamBadge').textContent = unread;
}

// ─── تبديل الدور ───
function switchRole(role) {
  state.currentRole = role;
  saveState();
  document.getElementById('roleSelect').value = role;
  const adminBtn = document.getElementById('adminBtn');
  const drawerAdminBtn = document.getElementById('drawerAdminBtn');
  if (role === 'senior') {
    adminBtn.classList.add('visible');
    drawerAdminBtn.style.display = 'flex';
  } else {
    adminBtn.classList.remove('visible');
    drawerAdminBtn.style.display = 'none';
  }
  render();
}

// ─── التبديل بين الأقسام ───
function showTab(tab) {
  currentTab = tab;
  displayedCount = PAGE_SIZE;
  // تحديث القائمة الجانبية
  document.querySelectorAll('.drawer-item').forEach(el => el.classList.remove('active'));
  const drawerItem = document.querySelector(`.drawer-item[data-tab="${tab}"]`);
  if (drawerItem) drawerItem.classList.add('active');
  render();
}

// ─── Dashboard ───
function renderDashboard(container) {
  const activePatients = state.patients.filter(p => p.status !== 'discharged').length;
  const pendingTasks = state.tasks.filter(t => !t.done).length;
  const criticalPatients = state.patients.filter(p => p.patientStatus === 'critical').length;
  const urgentHandovers = state.handovers.filter(h => h.urgent && !h.acknowledged).length;
  const totalPatients = state.patients.length;
  container.innerHTML = `
    <div class="dashboard">
      <div class="stat-card primary"><div class="stat-number">${activePatients}</div><div class="stat-label">🩺 مرضى نشطون</div></div>
      <div class="stat-card warning"><div class="stat-number">${pendingTasks}</div><div class="stat-label">📋 مهام معلقة</div></div>
      <div class="stat-card danger"><div class="stat-number">${criticalPatients}</div><div class="stat-label">🚨 مرضى حرجون</div></div>
      <div class="stat-card secondary"><div class="stat-number">${urgentHandovers}</div><div class="stat-label">📝 تسليم عاجل</div></div>
      <div class="stat-card success" style="grid-column: span 2;"><div class="stat-number">${totalPatients}</div><div class="stat-label">🏥 إجمالي المرضى</div></div>
    </div>
  `;
}

// ─── التصيير الرئيسي مع Lazy Loading ───
function render() {
  updateBadges();
  const container = document.getElementById('content');
  container.innerHTML = '';
  
  // Dashboard
  renderDashboard(container);
  
  // المحتوى حسب التبويب
  switch(currentTab) {
    case 'ward': renderWard(container); break;
    case 'clinic': renderClinic(container); break;
    case 'tasks': renderTasks(container); break;
    case 'team': renderTeam(container); break;
    case 'handover': renderHandover(container); break;
    case 'reports': renderReports(container); break;
  }
  
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const active = document.querySelector(`.tab[data-tab="${currentTab}"]`);
  if (active) active.classList.add('active');
  
  const adminBtn = document.getElementById('adminBtn');
  const drawerAdminBtn = document.getElementById('drawerAdminBtn');
  if (state.currentRole === 'senior') {
    adminBtn.classList.add('visible');
    drawerAdminBtn.style.display = 'flex';
  } else {
    adminBtn.classList.remove('visible');
    drawerAdminBtn.style.display = 'none';
  }
  
  // تحديث القائمة الجانبية
  document.querySelectorAll('.drawer-item').forEach(el => el.classList.remove('active'));
  const drawerItem = document.querySelector(`.drawer-item[data-tab="${currentTab}"]`);
  if (drawerItem) drawerItem.classList.add('active');
}

// ─── Lazy Loading Helper ───
function renderLazy(items, renderItemFn, container, key) {
  const total = items.length;
  const displayed = items.slice(0, displayedCount);
  
  displayed.forEach(item => {
    container.innerHTML += renderItemFn(item);
  });
  
  if (displayedCount < total) {
    const loader = document.createElement('div');
    loader.className = 'lazy-loader';
    loader.id = 'lazyLoader';
    loader.innerHTML = `<div class="spinner"></div><p style="margin-top:8px;">جاري تحميل المزيد...</p>`;
    container.appendChild(loader);
    
    const observer = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting) {
        observer.disconnect();
        displayedCount += PAGE_SIZE;
        // إزالة مؤقت التحميل وإعادة الرندر
        render();
      }
    }, { rootMargin: '0px 0px 100px 0px' });
    observer.observe(loader);
  }
}

// ─── الجناح (Ward) ───
function renderWard(container) {
  let active = state.patients.filter(p => p.status !== 'discharged');
  const discharged = state.patients.filter(p => p.status === 'discharged');
  active = filterBySearch(active, ['name', 'diagnosis', 'bed']);
  
  let html = `
    <div class="flex-between mb-8">
      <h2 style="font-size:18px;">🏥 الجناح</h2>
      ${can(['senior','junior']) ? `<button class="small" onclick="showAdmissionFormWizard()">➕ قبول</button>` : ''}
    </div>
    <div class="text-muted text-sm">👥 ${active.length} مريض نشط · ${discharged.length} مكتمل</div>
  `;
  
  if (!active.length) {
    html += `<div class="empty-state"><div class="emoji">🛏️</div><p>${state.searchQuery ? 'لا توجد نتائج بحث' : 'لا يوجد مرضى نشطين'}</p></div>`;
  } else {
    renderLazy(active, (p) => {
      const statusClass = p.patientStatus || 'stable';
      const statusMap = { stable: 'مستقر', monitoring: 'مراقبة', critical: 'حرج', intervention: 'يحتاج تدخل' };
      const statusLabel = statusMap[statusClass] || 'مستقر';
      const statusBadgeClass = statusClass === 'critical' ? 'critical' : statusClass === 'intervention' ? 'intervention' : statusClass === 'monitoring' ? 'monitoring' : 'stable';
      return `
        <div class="card clickable" onclick="viewPatientSnapshot('${p.id}')" style="border-right-color:${statusClass === 'critical' ? 'var(--danger)' : statusClass === 'intervention' ? 'var(--warning)' : 'var(--primary)'};">
          <div class="flex-between">
            <div>
              <div class="title">${p.name} <span class="text-muted text-sm">(${p.age}س)</span></div>
              <div class="sub">${p.diagnosis} · سرير ${p.bed}</div>
            </div>
            <span class="status-badge ${statusBadgeClass}">${statusLabel}</span>
          </div>
          <div class="meta"><span>⚖️ ${p.weight}كجم</span><span>🩺 ${p.vitals || '—'}</span></div>
          <div class="actions">
            ${can(['nurse','senior']) ? `<button class="small secondary" onclick="event.stopPropagation();updateVitals('${p.id}')">📊 فحوصات</button>` : ''}
            ${can(['senior']) ? `<button class="small secondary" onclick="event.stopPropagation();changePatientStatus('${p.id}')">🔄 حالة</button>` : ''}
            ${can(['junior','senior']) ? `<button class="small secondary" onclick="event.stopPropagation();addNote('${p.id}')">📝 ملاحظة</button>` : ''}
            ${can(['senior']) ? `<button class="small danger" onclick="event.stopPropagation();dischargePatient('${p.id}')">⬆️ خروج</button>` : ''}
          </div>
        </div>
      `;
    }, container, 'patients');
  }
  
  if (discharged.length) {
    html += `<details style="margin-top:8px;"><summary style="cursor:pointer;font-weight:600;color:var(--gray);font-size:12px;">✅ مكتمل (${discharged.length})</summary>`;
    discharged.forEach(p => {
      html += `<div class="card" style="border-right-color:var(--gray);opacity:0.6;"><div class="flex-between"><span class="title" style="font-size:13px;">${p.name}</span><span class="status-badge discharged">مكتمل</span></div><div class="sub">${p.diagnosis} · ${p.age}س</div></div>`;
    });
    html += `</details>`;
  }
  
  container.innerHTML += html;
}

// ─── تغيير حالة المريض ───
function changePatientStatus(id) {
  const p = state.patients.find(p => p.id === id);
  if (!p) return;
  const newStatus = prompt('اختر الحالة (stable, monitoring, critical, intervention):', p.patientStatus || 'stable');
  if (newStatus && ['stable','monitoring','critical','intervention'].includes(newStatus)) {
    p.patientStatus = newStatus;
    p.updatedAt = Date.now();
    addAuditLog('تغيير حالة المريض', `تم تغيير حالة ${p.name} إلى ${newStatus}`);
    saveState();
    render();
    showToast('✅ تم تحديث حالة المريض');
  }
}

// ─── نموذج القبول على خطوات (Wizard) ───
let wizardData = {};
function showAdmissionFormWizard() {
  wizardData = {};
  let step = 1;
  const totalSteps = 3;
  
  function renderWizardStep(step) {
    let html = `
      <h2>➕ قبول مريض جديد</h2>
      <div class="wizard-progress">
        ${[1,2,3].map(s => `
          <div class="step-indicator">
            <div class="step-circle ${s === step ? 'active' : s < step ? 'done' : ''}">${s < step ? '✓' : s}</div>
            <div class="step-label">${s === 1 ? 'معلومات أساسية' : s === 2 ? 'بيانات سريرية' : 'تاريخ مرضي'}</div>
          </div>
        `).join('')}
      </div>
      <div class="wizard-step ${step === 1 ? 'active' : ''}" data-step="1">
        <label>الاسم *</label><input id="admName" value="${wizardData.name||''}" placeholder="مثال: نور الهاشمي">
        <div class="form-row">
          <div><label>العمر (سنة) *</label><input id="admAge" type="number" value="${wizardData.age||''}" placeholder="3" min="0.1" step="0.1"></div>
          <div><label>الوزن (كجم) *</label><input id="admWeight" type="number" step="0.1" value="${wizardData.weight||''}" placeholder="14" min="0.1"></div>
        </div>
        <div class="form-row">
          <div><label>الطول (سم)</label><input id="admHeight" type="number" step="0.1" value="${wizardData.height||''}" placeholder="95"></div>
          <div><label>السرير *</label><input id="admBed" value="${wizardData.bed||''}" placeholder="مثال: PICU-2"></div>
        </div>
        <button onclick="wizardNext(1)" class="block">التالي →</button>
      </div>
      <div class="wizard-step ${step === 2 ? 'active' : ''}" data-step="2">
        <label>التشخيص *</label><input id="admDiagnosis" value="${wizardData.diagnosis||''}" placeholder="مثال: التهاب القصيبات">
        <label>مصدر الدخول</label>
        <select id="admSource" class="form-input"><option value="ER">الطوارئ</option><option value="OPD">العيادة</option><option value="Transfer">تحويل</option></select>
        <div style="display:flex;gap:8px;margin-top:8px;">
          <button onclick="wizardPrev(2)" class="secondary">← السابق</button>
          <button onclick="wizardNext(2)" class="block" style="flex:1;">التالي →</button>
        </div>
      </div>
      <div class="wizard-step ${step === 3 ? 'active' : ''}" data-step="3">
        <label>التاريخ المرضي والفحص</label>
        <textarea id="admHistory" placeholder="الملاحظات السريرية...">${wizardData.history||''}</textarea>
        <div style="display:flex;gap:8px;margin-top:8px;">
          <button onclick="wizardPrev(3)" class="secondary">← السابق</button>
          <button onclick="wizardSubmit()" class="success" style="flex:1;">✅ قبول</button>
        </div>
      </div>
    `;
    openModal(html);
  }
  
  window.wizardNext = function(currentStep) {
    // حفظ البيانات من الخطوة الحالية
    if (currentStep === 1) {
      wizardData.name = document.getElementById('admName')?.value || '';
      wizardData.age = document.getElementById('admAge')?.value || '';
      wizardData.weight = document.getElementById('admWeight')?.value || '';
      wizardData.height = document.getElementById('admHeight')?.value || '';
      wizardData.bed = document.getElementById('admBed')?.value || '';
      if (!wizardData.name || !wizardData.age || !wizardData.weight || !wizardData.bed) {
        alert('⚠️ جميع الحقول المطلوبة في هذه الخطوة يجب تعبئتها');
        return;
      }
    } else if (currentStep === 2) {
      wizardData.diagnosis = document.getElementById('admDiagnosis')?.value || '';
      wizardData.source = document.getElementById('admSource')?.value || 'ER';
      if (!wizardData.diagnosis) {
        alert('⚠️ التشخيص مطلوب');
        return;
      }
    }
    renderWizardStep(currentStep + 1);
  };
  
  window.wizardPrev = function(currentStep) {
    if (currentStep === 2) {
      wizardData.diagnosis = document.getElementById('admDiagnosis')?.value || '';
      wizardData.source = document.getElementById('admSource')?.value || 'ER';
    } else if (currentStep === 3) {
      wizardData.history = document.getElementById('admHistory')?.value || '';
    }
    renderWizardStep(currentStep - 1);
  };
  
  window.wizardSubmit = function() {
    wizardData.history = document.getElementById('admHistory')?.value || '';
    admitPatientWizard();
  };
  
  renderWizardStep(1);
}

function admitPatientWizard() {
  const { name, age, weight, height, bed, diagnosis, source, history } = wizardData;
  if (!name || isNaN(parseFloat(age)) || parseFloat(age) <= 0 || isNaN(parseFloat(weight)) || parseFloat(weight) <= 0 || !bed || !diagnosis) {
    alert('⚠️ جميع الحقول المطلوبة يجب تعبئتها بشكل صحيح');

  const id = 'p' + uid();

    dischargeChecklist: { summary: false, meds: false, followUp: false, education: false, signature: false },

  });

  });

// ─── الرسوم البيانية ───
function drawVitalsChartWithZones() {
  const canvas = document.getElementById('vitalsChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  const p = selectedPatient;
  let data = [];
  if (p.vitalsHistory && p.vitalsHistory.length > 0) {
    data = p.vitalsHistory.slice(-8).map((record, i) => {
      const match = record.vitals.match(/HR:?(\d+)/i);
      return match ? parseInt(match[1]) : 80 + i * 2;
    });
  }
  if (data.length < 2) { data = [88, 92, 85, 95, 90, 100, 88, 93]; }
  const range = 160;
  const drawZone = (y1, y2, color, label) => {
    ctx.fillStyle = color;
    ctx.fillRect(20, y1, W-40, y2-y1);
    ctx.fillStyle = '#1e293b';
    ctx.font = '8px system-ui';
    ctx.fillText(label, 4, (y1+y2)/2 + 3);
  };
  const normalTop = H - 10 - (100/range)*(H-20);
  const normalBottom = H - 10 - (60/range)*(H-20);
  const warningTop = H - 10 - (120/range)*(H-20);
  const warningBottom = H - 10 - (40/range)*(H-20);
  drawZone(0, warningTop, 'rgba(239,68,68,0.2)', 'خطر');
  drawZone(warningTop, normalTop, 'rgba(245,158,11,0.2)', 'تحذير');
  drawZone(normalTop, normalBottom, 'rgba(34,197,94,0.2)', 'طبيعي');
  drawZone(normalBottom, warningBottom, 'rgba(245,158,11,0.2)', 'تحذير');
  drawZone(warningBottom, H-10, 'rgba(239,68,68,0.2)', 'خطر');
  const step = (W - 40) / (data.length - 1);
  ctx.beginPath();
  ctx.strokeStyle = '#1a73e8';
  ctx.lineWidth = 2;
  data.forEach((v, i) => {
    const x = 20 + i * step;
    const y = H - 10 - (v/range)*(H-20);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();
  data.forEach((v, i) => {
    const x = 20 + i * step;
    const y = H - 10 - (v/range)*(H-20);
    ctx.beginPath();
    ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fillStyle = '#1a73e8';
    ctx.fill();
  });
  ctx.fillStyle = '#94a3b8';
  ctx.font = '9px system-ui';
  ctx.fillText('مخطط HR مع مناطق مرجعية (طبيعي 60-100)', 10, 14);
}

function drawGrowthChart() {
  const canvas = document.getElementById('growthChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  const p = selectedPatient;
  const age = Math.min(p.age || 1, 18);
  const weight = Math.min(p.weight || 5, 40);
  [[3,'#e2e8f0'],[50,'#94a3b8'],[97,'#e2e8f0']].forEach(r => {
    ctx.beginPath();
    ctx.strokeStyle = r[1];
    ctx.lineWidth = 1;
    ctx.setLineDash([3,3]);
    for (let a = 0; a <= 18; a += 0.5) {
      const x = 30 + (a/18)*(W-60);
      const base = 3 + a * 2.2;
      const y = H - 20 - ((base * (r[0]/100) + 1)/45)*(H-40);
      a === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.setLineDash([]);
  });
  const px = 30 + (age/18)*(W-60);
  const py = H - 20 - ((weight)/45)*(H-40);
  ctx.fillStyle = '#1a73e8';
  ctx.beginPath();
  ctx.arc(px, py, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#1a73e8';
  ctx.font = 'bold 10px system-ui';
  ctx.fillText(`● ${p.name} (${weight}كجم)`, px + 10, py + 3);
  ctx.fillStyle = '#94a3b8';
  ctx.font = '9px system-ui';
  ctx.fillText('مخطط النمو (وزن/عمر) مع منحنيات مرجعية (3%, 50%, 97%)', 10, 14);
}

function calcIVFluids() {
  const p = selectedPatient; if (!p) return alert('اختر مريضاً أولاً');
  const w = p.weight || 10; let vol;
  if (w <= 10) vol = w * 100;
  else if (w <= 20) vol = 1000 + (w-10)*50;
  else vol = 1500 + (w-20)*20;
  alert(`💧 السوائل الوريدية للمحافظة (${w} كجم)\n${vol} مل/يوم ≈ ${Math.round(vol/24)} مل/ساعة`);
}

function calcEmergencyDrugs() {
  const p = selectedPatient; if (!p) return alert('اختر مريضاً أولاً');
  const w = p.weight || 10;
  alert(`💊 الأدوية الطارئة (${w} كجم)\nأدرينالين 0.01 مغ/كجم = ${(w*0.01).toFixed(2)} مغ\nسالبوتامول بخاخ = ${w<20?'2.5':'5'} مغ\nديازيبام 0.2 مغ/كجم = ${(w*0.2).toFixed(1)} مغ\nغلوكوز 10% 2 مل/كجم = ${(w*2).toFixed(0)} مل`);
}

function calcBilirubin() {
  const age = prompt('العمر بالساعات (حديث الولادة):');
  const bili = prompt('البيليروبين الكلي (ميكرومول/لتر):');
  const gestation = prompt('عمر الحمل (أسابيع):');
  if (!age || !bili || !gestation) return;
  const bil = parseFloat(bili), ga = parseInt(gestation);
  if (isNaN(bil) || isNaN(ga)) return alert('أدخل أرقاماً صحيحة');
  const threshold = ga < 38 ? 250 : 300;
  if (bil > threshold) alert(`🧪 البيليروبين ${bil} > الحد ${threshold}. يُنصح بالعلاج الضوئي.`);
  else alert(`🧪 البيليروبين ${bil} ضمن الحدود الطبيعية (<${threshold}).`);
}

function renderClinic(container) {
  let slots = filterBySearch(state.clinicSlots, ['patientName', 'reason']);

  } else {
    slots.forEach(s => {
      html += `<div class="card" style="border-right-color:${s.status === 'مكتمل' ? 'var(--success)' : 'var(--warning)'};">
        <div class="flex-between"><div><div class="title">${s.patientName}</div><div class="sub">⏰ ${s.time} · ${s.age} سنة · ${s.reason}</div></div>
        <span class="status-badge ${s.status === 'مكتمل' ? 'completed' : 'waiting'}">${s.status}</span></div>
        ${can(['admin']) ? `<div class="actions"><button class="small secondary" onclick="updateClinicStatus('${s.id}','مكتمل')">✅ مكتمل</button><button class="small danger" onclick="removeClinicSlot('${s.id}')">🗑️</button></div>` : ''}
      </div>`;
    });
  }
  container.innerHTML += html;
}

function addClinicSlot() {
  const time = prompt('الوقت (مثال: 10:30):');
  const name = prompt('اسم المريض:');
  const age = prompt('العمر:');
  const reason = prompt('سبب الزيارة:');
  if (!time || !name || !age || !reason) return;
  state.clinicSlots.push({ id: 'c'+uid(), time, patientName: name, age: parseInt(age), reason, status: 'انتظار', updatedAt: Date.now() });
  addAuditLog('إضافة موعد عيادة', `تم إضافة موعد لـ ${name}`);
  saveState();
  render();
  showToast('✅ تمت إضافة الموعد');
}

function updateClinicStatus(id, status) {
  const s = state.clinicSlots.find(s => s.id === id);
  if (s) { s.status = status; s.updatedAt = Date.now(); addAuditLog('تحديث موعد', `تم تحديث موعد ${s.patientName} إلى ${status}`); saveState(); render(); showToast('✅ تم تحديث الحالة'); }
}

function removeClinicSlot(id) {
  if (!confirm('حذف الموعد؟')) return;
  const s = state.clinicSlots.find(s => s.id === id);
  state.clinicSlots = state.clinicSlots.filter(s => s.id !== id);
  if (s) addAuditLog('حذف موعد', `تم حذف موعد ${s.patientName}`);
  saveState();
  render();
}

// ─── المهام ───
function renderTasks(container) {
  let tasks = filterBySearch(state.tasks.filter(t => !t.done), ['text']);
  let doneTasks = filterBySearch(state.tasks.filter(t => t.done), ['text']);
  let html = `<div class="flex-between mb-8"><h2 style="font-size:18px;">📋 المهام</h2>${can(['senior']) ? `<button class="small" onclick="addTask()">➕ إضافة</button>` : ''}</div>`;
  if (!tasks.length) {
    html += `<div class="empty-state"><div class="emoji">✅</div><p>${state.searchQuery ? 'لا توجد نتائج بحث' : 'لا توجد مهام معلقة'}</p></div>`;
  } else {
    tasks.forEach(t => {
      const isMine = t.assignee === state.currentRole || state.currentRole === 'senior';
      const isOverdue = t.dueDate && t.dueDate < today() && !t.done;
      const isSoon = t.dueDate && t.dueDate === today() && !t.done;
      let tagClass = t.priority;
      if (isOverdue) tagClass = 'overdue';
      else if (isSoon) tagClass = 'soon';
      const dueDisplay = t.dueDate ? (t.dueTime ? `${t.dueDate} ${t.dueTime}` : t.dueDate) : '';
      html += `<div class="card" style="border-right-color:${isOverdue ? 'var(--danger)' : isSoon ? 'var(--warning)' : t.priority === 'high' ? 'var(--danger)' : t.priority === 'medium' ? 'var(--warning)' : 'var(--gray)'};">
        <div class="flex-between"><span class="title" style="font-size:14px;">${t.text} ${isOverdue ? '⏰' : isSoon ? '🕐' : ''}</span>
        <span class="tag ${tagClass}">${isOverdue ? 'متأخرة' : isSoon ? 'مستحقة قريباً' : t.priority}</span></div>
        <div class="sub">👤 ${getRoleLabel(t.assignee)} · ${t.createdAt || ''} ${dueDisplay ? '· استحقاق: ' + dueDisplay : ''}</div>
        ${isMine ? `<div class="actions"><button class="small" onclick="toggleTask('${t.id}')">✅ إنجاز</button></div>` : ''}
      </div>`;
    });
  }
  if (doneTasks.length) {
    html += `<details style="margin-top:8px;"><summary style="cursor:pointer;font-weight:600;color:var(--gray);font-size:12px;">✅ منجزة (${doneTasks.length})</summary>`;
    doneTasks.forEach(t => {
      html += `<div class="card" style="border-right-color:var(--success);opacity:0.5;"><div class="flex-between"><span style="font-size:13px;">${t.text}</span><span class="done-badge">✓</span></div></div>`;
    });
    html += `</details>`;
  }
  container.innerHTML += html;
}

function addTask() {
  const text = prompt('وصف المهمة:');
  if (!text) return;
  const assignee = prompt('المسؤول (senior/junior/nurse):') || 'junior';
  const priority = prompt('الأولوية (high/medium/low):') || 'medium';
  const dueDate = prompt('تاريخ الاستحقاق (YYYY-MM-DD):') || today();
  const dueTime = prompt('وقت الاستحقاق (HH:MM):') || timeNow();
  state.tasks.push({
    id: 't'+uid(), text, priority: priority.toLowerCase(),
    assignee: assignee.toLowerCase(), done: false,
    createdAt: today(), dueDate, dueTime, reminded: false,
    updatedAt: Date.now()
  });
  addAuditLog('إضافة مهمة', `تم إضافة مهمة: ${text} لـ ${assignee}`);
  saveState();
  render();
  showToast('📋 تمت إضافة المهمة');
}

function toggleTask(id) {
  const t = state.tasks.find(t => t.id === id);
  if (t) {
    t.done = !t.done;
    t.updatedAt = Date.now();
    addAuditLog('تحديث مهمة', `تم ${t.done ? 'إنجاز' : 'إعادة فتح'} مهمة: ${t.text}`);
    saveState();
    render();
    showToast(t.done ? '✅ تم إنجاز المهمة' : '🔄 تم إعادة فتح المهمة');
  }
}

// ─── الفريق ───
function renderTeam(container) {
  let messages = filterBySearch(state.teamMessages, ['sender', 'text']);
  let html = `<div class="flex-between mb-8"><h2 style="font-size:18px;">👥 الفريق</h2><span class="text-muted">${state.teamMembers.length} أعضاء</span></div>
    <div class="member-list">${state.teamMembers.map(m => `<span class="member">${getRoleEmoji(m.role)} ${m.name} <span class="role-tag">${getRoleLabel(m.role)}</span>${m.role === state.currentRole ? '⭐' : ''}</span>`).join('')}</div>

    html += `<div class="empty-state"><div class="emoji">💬</div><p>${state.searchQuery ? 'لا توجد نتائج بحث' : 'لا توجد رسائل'}</p></div>`;
  } else {
    messages.slice().reverse().forEach(m => {

function sendTeamMsg() {
  const input = document.getElementById('teamMsgInput');
  if (!input) return;

  const sender = state.teamMembers.find(m => m.role === state.currentRole)?.name || getRoleLabel(state.currentRole);

// ─── التسليم ───
function renderHandover(container) {
  let handovers = filterBySearch(state.handovers, ['situation', 'background', 'assessment', 'recommendation', 'author', 'patientName']);
  let html = `<div class="flex-between mb-8"><h2 style="font-size:18px;">📝 التسليم</h2>${can(['junior','senior']) ? `<button class="small" onclick="createHandover()">➕ جديد</button>` : ''}</div>`;
  const sorted = [...handovers].sort((a,b) => {
    if (a.urgent && !a.acknowledged) return -1;
    if (b.urgent && !b.acknowledged) return 1;
    return 0;
  });
  if (!sorted.length) {
    html += `<div class="empty-state"><div class="emoji">📄</div><p>${state.searchQuery ? 'لا توجد نتائج بحث' : 'لا يوجد تسليم'}</p></div>`;
  } else {
    sorted.forEach(h => {
      const isUrgent = h.urgent && !h.acknowledged;
      html += `<div class="card" style="border-right-color:${isUrgent ? 'var(--danger)' : 'var(--primary)'};">
        <div class="flex-between"><span class="title" style="font-size:13px;">${h.date} · ${h.author}</span>
        <div>${isUrgent ? '<span class="urgent-badge">🚨 عاجل</span>' : ''}${h.acknowledged ? '<span class="done-badge">✓ تم الاستلام</span>' : ''}</div></div>
        ${h.patientName ? `<div class="sub">👤 المريض: ${h.patientName}</div>` : ''}
        <div style="font-size:12px;margin-top:4px;"><div><b>S:</b> ${h.situation}</div><div><b>B:</b> ${h.background}</div><div><b>A:</b> ${h.assessment}</div><div><b>R:</b> ${h.recommendation}</div></div>
        ${!h.acknowledged ? `<div class="actions"><button class="small" onclick="acknowledgeHandover('${h.id}')">✓ استلام</button></div>` : ''}
      </div>`;
    });
  }
  container.innerHTML += html;
}

function createHandover() {
  openModal(`
    <h2>📝 تسليم جديد (SBAR)</h2>
    <div style="margin-bottom:10px;background:#f8fafc;padding:8px;border-radius:8px;font-size:13px;color:var(--gray);">⚠️ جميع الحقول مطلوبة</div>
    <label>المريض</label>
    <select id="hoPatient" class="form-input">
      <option value="">اختر مريضاً (اختياري)</option>
      ${state.patients.filter(p => p.status !== 'discharged').map(p => `<option value="${p.id}">${p.name} (${p.diagnosis})</option>`).join('')}
    </select>
    <label>الموقف (S) *</label><input id="hoS" placeholder="ماذا يحدث؟">
    <label>الخلفية (B) *</label><input id="hoB" placeholder="التاريخ المرضي؟">
    <label>التقييم (A) *</label><input id="hoA" placeholder="التشخيص؟">
    <label>التوصية (R) *</label><input id="hoR" placeholder="ماذا نفعل؟">

function saveHandover() {
  const s = document.getElementById('hoS').value.trim();
  const b = document.getElementById('hoB').value.trim();
  const a = document.getElementById('hoA').value.trim();
  const r = document.getElementById('hoR').value.trim();
  const urgent = document.getElementById('hoUrgent').checked;
  const patientId = document.getElementById('hoPatient').value;
  if (!s || !b || !a || !r) { alert('⚠️ جميع حقول SBAR مطلوبة'); return; }
  const patient = state.patients.find(p => p.id === patientId);
  state.handovers.push({
    id: 'h'+uid(), date: today(), author: getRoleLabel(state.currentRole),
    patientId: patientId || null, patientName: patient ? patient.name : null,
    situation: s, background: b, assessment: a, recommendation: r,
    urgent, acknowledged: false, updatedAt: Date.now()
  });
  addAuditLog('تسليم جديد', `تم إنشاء تسليم من ${state.currentRole}${patient ? ' لـ ' + patient.name : ''}`);
  saveState();
  closeModal();
  render();
  showToast('📝 تم حفظ التسليم');
}

function acknowledgeHandover(id) {
  const h = state.handovers.find(h => h.id === id);
  if (h) { h.acknowledged = true; h.updatedAt = Date.now(); addAuditLog('استلام تسليم', `تم استلام تسليم من ${h.author}`); saveState(); render(); showToast('✅ تم استلام التسليم'); }
}

      </div>
      <div class="card" style="border-right-color:var(--secondary);"><div class="title">👥 المهام حسب الدور</div>

      <div class="card" style="border-right-color:var(--warning);"><div class="title">📝 التسليم</div>

// ─── تصدير واستيراد ───
window.exportData = function() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `PaedsWard_Backup_${today()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('📤 تم تصدير البيانات');
};

window.importData = function(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.patients) state.patients = data.patients;
      if (data.tasks) state.tasks = data.tasks;
      if (data.handovers) state.handovers = data.handovers;
      if (data.clinicSlots) state.clinicSlots = data.clinicSlots;
      if (data.teamMessages) state.teamMessages = data.teamMessages;
      if (data.teamMembers) state.teamMembers = data.teamMembers;
      if (data.auditLog) state.auditLog = data.auditLog;
      state.lastSync = Date.now();
      addAuditLog('استيراد بيانات', 'تم استيراد البيانات من ملف');
      saveState();
      render();
      showToast('✅ تم استيراد البيانات بنجاح');
    } catch (err) { alert('⚠️ ملف غير صالح'); }
  };
  reader.readAsText(file);
  event.target.value = '';
};

// ─── إشعارات المتصفح ───
function requestNotificationPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function checkTaskReminders() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const now = new Date();
  state.tasks.filter(t => !t.done && !t.reminded).forEach(t => {
    if (t.dueDate && t.dueTime) {
      const dueDateTime = new Date(`${t.dueDate}T${t.dueTime}`);
      const diffMin = (dueDateTime - now) / 60000;
      if (diffMin > 0 && diffMin <= 30) {
        new Notification('⏰ تذكير بمهمة', {
          body: `${t.text} (مستحقة خلال ${Math.round(diffMin)} دقيقة)`,
          icon: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Ccircle cx="50" cy="50" r="45" fill="%231a73e8"/%3E%3Ctext x="50" y="65" font-size="40" text-anchor="middle" fill="white"%3E%2B%3C/text%3E%3C/svg%3E'
        });
        t.reminded = true;
        saveState();
      }
    }
  });
}
