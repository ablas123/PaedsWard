<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🏥 PaedsWard – سير العمل المتكامل</title>
  <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22PaedsWard%22%2C%22short_name%22%3A%22PaedsWard%22%2C%22start_url%22%3A%22.%2Findex.html%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f0f4f8%22%2C%22theme_color%22%3A%22%231a73e8%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20100%20100'%3E%3Ccircle%20cx%3D'50'%20cy%3D'50'%20r%3D'45'%20fill%3D'%231a73e8'%2F%3E%3Ctext%20x%3D'50'%20y%3D'65'%20font-size%3D'40'%20text-anchor%3D'middle'%20fill%3D'white'%3E%2B%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22100x100%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
  <script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1a73e8; --primary-dark: #0b3d91; --primary-light: #e8f0fe;
      --secondary: #6c63ff; --success: #22c55e; --danger: #e53935;
      --warning: #f59e0b; --gray: #94a3b8; --dark: #1e293b;
      --font: 'Cairo', system-ui, sans-serif;
      --radius: 12px; --shadow: 0 4px 12px rgba(0,0,0,0.08);
      --transition: 0.25s ease;
    }
    body { font-family: var(--font); background: #f1f5f9; direction: rtl; font-size: 14px; line-height: 1.6; }
    .app { max-width: 500px; margin: 0 auto; background: white; min-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 0 30px rgba(0,0,0,0.05); }
    @media (min-width: 501px) { .app { max-width: 600px; min-height: 90vh; height: 95vh; border-radius: 20px; margin: 20px auto; } body { display: flex; align-items: center; justify-content: center; background: #dce3ed; } }
    @media (min-width: 768px) { .app { max-width: 900px; } .app .drawer { transform: translateX(0) !important; width: 220px; } .app .main-content { margin-right: 220px; } .app .tab-bar { display: none !important; } }
    /* Offline Banner */
    .offline-banner { background: var(--danger); color: white; padding: 4px 12px; text-align: center; font-size: 12px; font-weight: 600; display: none; }
    .offline-banner.visible { display: block; }
    /* Header */
    header { background: linear-gradient(135deg, var(--primary-dark), var(--primary)); color: white; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-radius: 0 0 20px 20px; position: sticky; top: 0; z-index: 30; flex-shrink: 0; flex-wrap: wrap; gap: 6px; }
    header .brand { font-size: 18px; font-weight: 800; cursor: pointer; }
    header .brand small { font-weight: 400; font-size: 10px; opacity: 0.8; }
    .header-actions { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .header-actions select { background: rgba(255,255,255,0.18); color: white; border: 1px solid rgba(255,255,255,0.25); border-radius: 30px; padding: 4px 12px; font-size: 12px; font-weight: 500; cursor: pointer; outline: none; direction: rtl; backdrop-filter: blur(4px); }
    .header-actions select option { background: var(--dark); color: white; }
    .header-actions button { background: rgba(255,255,255,0.15); border: none; color: white; padding: 4px 12px; border-radius: 30px; font-size: 12px; font-weight: 600; cursor: pointer; transition: var(--transition); }
    .header-actions button:active { transform: scale(0.95); }
    #adminBtn { background: #fbbf24; color: var(--dark); display: none; }
    #adminBtn.visible { display: inline-block; }
    .drawer-toggle { display: none; background: rgba(255,255,255,0.15); border: none; color: white; padding: 4px 12px; border-radius: 30px; font-size: 18px; cursor: pointer; }
    .sync-status { font-size: 12px; background: rgba(255,255,255,0.15); padding: 2px 10px; border-radius: 30px; display: flex; align-items: center; gap: 4px; }
    .sync-status .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
    .sync-status .dot.online { background: #4ade80; }
    .sync-status .dot.offline { background: #f87171; }
    /* Drawer */
    .drawer { position: fixed; top: 0; right: 0; width: 280px; height: 100%; background: white; z-index: 40; transform: translateX(100%); transition: transform 0.3s ease; box-shadow: -4px 0 20px rgba(0,0,0,0.1); padding: 16px; overflow-y: auto; }
    .drawer.open { transform: translateX(0); }
    .drawer .drawer-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 12px; border-bottom: 1px solid #e2e8f0; margin-bottom: 12px; }
    .drawer .drawer-header h3 { font-size: 16px; }
    .drawer .drawer-close { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--gray); }
    .drawer .drawer-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: var(--transition); color: var(--dark); text-decoration: none; font-size: 14px; }
    .drawer .drawer-item:hover { background: var(--primary-light); }
    .drawer .drawer-item.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
    .drawer .drawer-item .badge { background: var(--danger); color: white; border-radius: 30px; padding: 0px 6px; font-size: 10px; font-weight: 700; margin-right: auto; }
    .drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 35; display: none; }
    .drawer-overlay.visible { display: block; }
    /* Search Bar */
    .search-bar { padding: 8px 16px; background: white; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 10; }
    .search-bar input { width: 100%; padding: 8px 14px; border: 1.5px solid #e2e8f0; border-radius: 30px; font-size: 14px; background: #f8fafc; outline: none; transition: var(--transition); font-family: var(--font); }
    .search-bar input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 3px rgba(26,115,232,0.15); }
    /* Dashboard */
    .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .dashboard .stat-card { background: white; border-radius: var(--radius); padding: 12px; box-shadow: var(--shadow); border-right: 4px solid var(--primary); text-align: center; }
    .dashboard .stat-card .stat-number { font-size: 24px; font-weight: 800; }
    .dashboard .stat-card .stat-label { font-size: 12px; color: var(--gray); }
    .dashboard .stat-card.primary { border-right-color: var(--primary); }
    .dashboard .stat-card.success { border-right-color: var(--success); }
    .dashboard .stat-card.warning { border-right-color: var(--warning); }
    .dashboard .stat-card.danger { border-right-color: var(--danger); }
    .dashboard .stat-card.secondary { border-right-color: var(--secondary); }
    /* Tab Bar */
    .tab-bar { display: flex; background: white; border-top: 1px solid #e2e8f0; position: sticky; bottom: 0; z-index: 15; flex-shrink: 0; }
    .tab { flex: 1; text-align: center; padding: 6px 4px 4px; font-size: 10px; color: var(--gray); cursor: pointer; border-bottom: 3px solid transparent; transition: var(--transition); user-select: none; display: flex; flex-direction: column; align-items: center; gap: 2px; position: relative; }
    .tab .tab-icon { font-size: 18px; }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); background: var(--primary-light); }
    .badge { position: absolute; top: 2px; right: 8px; background: var(--danger); color: white; border-radius: 30px; padding: 0px 6px; font-size: 9px; font-weight: 700; display: none; min-width: 18px; text-align: center; }
    /* Main Content */
    .main-content { flex: 1; padding: 12px; overflow-y: auto; background: #f8fafc; }
    /* Cards */
    .card { background: white; border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; box-shadow: var(--shadow); border-right: 4px solid var(--primary); transition: var(--transition); cursor: default; }
    .card.clickable { cursor: pointer; }
    .card.clickable:active { transform: scale(0.98); }
    .card .title { font-weight: 700; font-size: 15px; }
    .card .sub { color: var(--gray); font-size: 12px; }
    .card .meta { display: flex; flex-wrap: wrap; gap: 4px 10px; margin-top: 4px; font-size: 12px; }
    .card .actions { margin-top: 6px; display: flex; gap: 4px; flex-wrap: wrap; }
    .status-badge { display: inline-block; padding: 2px 10px; border-radius: 30px; font-size: 11px; font-weight: 600; }
    .status-badge.stage1 { background: #dbeafe; color: #1a56db; }
    .status-badge.stage2 { background: #fef3c7; color: #92400e; }
    .status-badge.stage3 { background: #d1fae5; color: #065f46; }
    .status-badge.stage4 { background: #e0e7ff; color: #3730a3; }
    .status-badge.discharged { background: #f1f5f9; color: #64748b; }
    .tag { display: inline-block; padding: 1px 8px; border-radius: 12px; font-size: 10px; font-weight: 600; background: #e2e8f0; }
    .tag.high { background: #fee2e2; color: #b91c1c; }
    .tag.medium { background: #fef3c7; color: #92400e; }
    .tag.low { background: #dbeafe; color: #1a56db; }
    .tag.overdue { background: #fee2e2; color: #b91c1c; border: 1px solid #b91c1c; }
    .tag.soon { background: #fef3c7; color: #92400e; }
    /* Buttons */
    button { background: var(--primary); color: white; border: none; border-radius: 8px; padding: 8px 16px; font-size: 14px; font-weight: 600; cursor: pointer; transition: var(--transition); touch-action: manipulation; }
    button:active { transform: scale(0.96); }
    button.secondary { background: var(--primary-light); color: var(--primary); }
    button.danger { background: var(--danger); color: white; }
    button.success { background: var(--success); color: white; }
    button.small { padding: 4px 12px; font-size: 12px; }
    button.block { width: 100%; justify-content: center; margin: 4px 0; }
    /* Forms */
    input, textarea, select { width: 100%; padding: 10px 14px; margin: 4px 0 10px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 14px; background: #f8fafc; outline: none; font-family: var(--font); direction: rtl; transition: var(--transition); }
    input:focus, textarea:focus, select:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 3px rgba(26,115,232,0.1); }
    textarea { min-height: 70px; resize: vertical; }
    label { font-size: 12px; font-weight: 600; color: #475569; display: block; margin-top: 4px; }
    .check-label { display: flex; align-items: center; gap: 8px; font-weight: 400; font-size: 14px; cursor: pointer; margin: 4px 0; }
    .check-label input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .form-row .full { grid-column: 1 / -1; }
    /* Modal */
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.6); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 12px; }
    .modal-content { background: white; border-radius: 20px; padding: 16px 18px; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.25); animation: modalSlide 0.3s ease; }
    @keyframes modalSlide { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-content h2 { font-size: 20px; margin-bottom: 12px; }
    .modal-content h3 { font-size: 15px; margin: 10px 0 4px; color: #475569; }
    .hidden { display: none !important; }
    /* Workflow Progress */
    .workflow-progress { display: flex; justify-content: space-between; margin: 10px 0; position: relative; }
    .workflow-progress::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 2px; background: #e2e8f0; transform: translateY(-50%); z-index: 0; }
    .workflow-step { display: flex; flex-direction: column; align-items: center; z-index: 1; background: white; padding: 0 4px; }
    .workflow-step .step-circle { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #e2e8f0; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; background: white; color: var(--gray); transition: var(--transition); }
    .workflow-step .step-circle.active { border-color: var(--primary); background: var(--primary); color: white; }
    .workflow-step .step-circle.done { border-color: var(--success); background: var(--success); color: white; }
    .workflow-step .step-label { font-size: 10px; color: var(--gray); margin-top: 4px; text-align: center; }
    /* Toast */
    .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--dark); color: white; padding: 10px 24px; border-radius: 30px; font-size: 14px; font-weight: 500; z-index: 200; box-shadow: 0 8px 30px rgba(0,0,0,0.2); max-width: 90%; text-align: center; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    /* Charts */
    .chart-wrap { background: #f8fafc; border-radius: 10px; padding: 8px; margin: 6px 0; text-align: center; }
    .chart-wrap canvas { max-width: 100%; height: auto; }
    /* Team */
    .member-list { display: flex; flex-wrap: wrap; gap: 4px; margin: 4px 0; }
    .member-list .member { background: var(--primary-light); padding: 4px 12px; border-radius: 30px; font-size: 12px; display: flex; align-items: center; gap: 4px; }
    .role-tag { display: inline-block; padding: 1px 8px; border-radius: 30px; font-size: 10px; font-weight: 600; background: var(--primary-light); color: var(--primary); }
    .message { background: white; padding: 8px 12px; border-radius: 10px; margin-bottom: 4px; border-right: 3px solid #8b5cf6; }
    .message .sender { font-weight: 700; font-size: 12px; }
    .message .time { color: var(--gray); font-size: 10px; }
    .message .text { font-size: 13px; margin-top: 2px; }
    /* Lazy Loader */
    .lazy-loader { text-align: center; padding: 16px; color: var(--gray); font-size: 12px; }
    .lazy-loader .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #e2e8f0; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* Scrollbar */
    .main-content::-webkit-scrollbar { width: 4px; }
    .main-content::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
    .main-content::-webkit-scrollbar-track { background: transparent; }
    .empty-state { text-align: center; padding: 30px 16px; color: var(--gray); }
    .empty-state .emoji { font-size: 32px; }
    .empty-state p { font-size: 13px; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 4px; }
    .text-muted { color: var(--gray); font-size: 12px; }
    .text-sm { font-size: 12px; }
    .mt-8 { margin-top: 8px; }
    .mb-8 { margin-bottom: 8px; }
  </style>
</head>
<body>
<div id="app">
  <!-- Offline Banner -->
  <div class="offline-banner" id="offlineBanner">⚠️ وضع غير متصل – سيتم المزامنة تلقائياً</div>
  <!-- Drawer Overlay -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="toggleDrawer()"></div>
  <!-- Drawer -->
  <div class="drawer" id="drawer">
    <div class="drawer-header"><h3>🏥 PaedsWard</h3><button class="drawer-close" onclick="toggleDrawer()">✕</button></div>
    <div id="drawerItems"></div>
    <hr>
    <div class="drawer-item" onclick="adminOpenPanel(); toggleDrawer();" id="drawerAdminBtn" style="display:none;"><span>🔑</span> إدارة الفريق</div>
    <div class="drawer-item" onclick="exportData(); toggleDrawer();"><span>📤</span> تصدير</div>
    <div class="drawer-item" onclick="document.getElementById('importFile').click(); toggleDrawer();"><span>📥</span> استيراد</div>
  </div>
  <!-- Header -->
  <header>
    <div class="brand" onclick="switchTab('dashboard')">🏥 PaedsWard <small>· سير العمل</small></div>
    <div class="header-actions">
      <button class="drawer-toggle" onclick="toggleDrawer()">☰</button>
      <select id="roleSelect" onchange="switchRole(this.value)">
        <option value="senior">👨‍⚕️ استشاري</option>
        <option value="junior">🧑‍⚕️ مبتدئ</option>
        <option value="nurse">👩‍⚕️ ممرض</option>
        <option value="admin">📋 إداري</option>
      </select>
      <button id="adminBtn" onclick="adminOpenPanel()">🔑</button>
      <button onclick="exportData()" title="تصدير">📤</button>
      <button onclick="document.getElementById('importFile').click()" title="استيراد">📥</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
      <span class="sync-status"><span class="dot offline" id="syncDot"></span><span id="syncLabel">محلي</span></span>
    </div>
  </header>
  <!-- Search Bar -->
  <div class="search-bar">
    <input type="text" id="globalSearch" placeholder="🔍 بحث في جميع البيانات..." oninput="searchGlobal(this.value)">
  </div>
  <!-- Main Content -->
  <div class="main-content" id="appContent"></div>
  <!-- Tab Bar -->
  <div class="tab-bar" id="tabBar"></div>
</div>
<!-- Modal -->
<div id="modal" class="modal hidden" onclick="closeModalOverlay(event)">
  <div class="modal-content" id="modalContent" onclick="event.stopPropagation()"></div>
</div>

<script>
// ================================================================
//  نظام سير العمل المتكامل – Workflow-Driven Architecture
// ================================================================

// ─── 1. إدارة الحالة (State) ───
const store = localforage.createInstance({ name: 'PaedsWard', storeName: 'state' });
let state = {
  patients: [],
  tasks: [],
  handovers: [],
  clinicSlots: [],
  teamMembers: [
    { id: 'u1', name: 'د. أحمد', role: 'senior' },
    { id: 'u2', name: 'د. سارة', role: 'junior' },
    { id: 'u3', name: 'م. ليلى', role: 'nurse' }
  ],
  teamMessages: [],
  currentRole: 'senior',
  lastSync: Date.now(),
  auditLog: [],
  searchQuery: '',
  isOffline: false,
  _version: '6.0.0'
};

// ─── 2. تعريف الأدوار والصلاحيات ───
const ROLES = {
  senior: {
    label: 'استشاري أول',
    permissions: ['view_all', 'manage_team', 'discharge', 'approve_plan', 'view_reports', 'create_task', 'view_patients']
  },
  junior: {
    label: 'طبيب مبتدئ',
    permissions: ['admit', 'write_notes', 'complete_tasks', 'create_handover', 'view_patients', 'update_vitals']
  },
  nurse: {
    label: 'ممرض',
    permissions: ['update_vitals', 'view_patients', 'complete_tasks']
  },
  admin: {
    label: 'إداري',
    permissions: ['manage_clinic', 'view_patients', 'send_alerts']
  }
};

function hasPermission(role, perm) {
  return ROLES[role] && ROLES[role].permissions.includes(perm);
}

// ─── 3. دوال مساعدة ───
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function today() { return new Date().toISOString().split('T')[0]; }
function timeNow() { return new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' }); }
function getRoleLabel(r) { return ROLES[r]?.label || r; }
function getRoleEmoji(r) { const m = { senior:'👨‍⚕️', junior:'🧑‍⚕️', nurse:'👩‍⚕️', admin:'📋' }; return m[r]||'👤'; }
function showToast(msg) { const old=document.querySelector('.toast'); if(old) old.remove(); const el=document.createElement('div'); el.className='toast'; el.textContent=msg; document.body.appendChild(el); setTimeout(()=>{ el.style.opacity='0'; setTimeout(()=>el.remove(),300); }, 3000); }
function openModal(html){ document.getElementById('modal').classList.remove('hidden'); document.getElementById('modalContent').innerHTML=html; }
function closeModal(){ document.getElementById('modal').classList.add('hidden'); }
function closeModalOverlay(e){ if(e.target===document.getElementById('modal')) closeModal(); }
function toggleDrawer(){ document.getElementById('drawer').classList.toggle('open'); document.getElementById('drawerOverlay').classList.toggle('visible'); }
function addAuditLog(action, details){ state.auditLog.push({timestamp:new Date().toISOString(), user:state.currentRole, action, details, id:uid()}); if(state.auditLog.length>100) state.auditLog=state.auditLog.slice(-100); }

// ─── 4. تحميل وحفظ البيانات ───
async function loadState() {
  try { const saved = await store.getItem('state'); if(saved) { if(saved._version !== state._version) migrateState(saved); else state = { ...state, ...saved }; } } catch(e){ console.warn(e); }
}
async function saveState() {
  try { state._version='6.0.0'; await store.setItem('state', state); bus.emit('stateSaved'); } catch(e){ console.warn(e); }
}
function migrateState(old) {
  // ترقية البيانات إذا تغير الإصدار
  const merged = { ...state, ...old };
  if(!merged.auditLog) merged.auditLog = [];
  state = merged;
  saveState();
}

// ─── 5. نظام الأحداث (Event Bus) ───
const bus = {
  events: {},
  on(event, cb){ if(!this.events[event]) this.events[event]=[]; this.events[event].push(cb); },
  off(event, cb){ if(!this.events[event]) return; this.events[event]=this.events[event].filter(f=>f!==cb); },
  emit(event, data){ if(!this.events[event]) return; this.events[event].forEach(cb=>cb(data)); }
};

// ─── 6. التنقل وعناصر الواجهة ───
let currentTab = 'dashboard';
const tabs = [
  { id: 'dashboard', icon: '📊', label: 'الرئيسية' },
  { id: 'ward', icon: '🏥', label: 'الجناح' },
  { id: 'clinic', icon: '🩺', label: 'العيادة' },
  { id: 'tasks', icon: '📋', label: 'المهام' },
  { id: 'team', icon: '👥', label: 'الفريق' },
  { id: 'handover', icon: '📝', label: 'التسليم' },
  { id: 'reports', icon: '📊', label: 'التقارير' }
];

function renderTabs() {
  const container = document.getElementById('tabBar');
  container.innerHTML = tabs.map(t => `
    <div class="tab ${t.id===currentTab?'active':''}" data-tab="${t.id}" onclick="switchTab('${t.id}')">
      <span class="tab-icon">${t.icon}</span>
      <span>${t.label}</span>
      <span class="badge" id="badge_${t.id}">0</span>
    </div>
  `).join('');
  // Drawer
  const drawerContainer = document.getElementById('drawerItems');
  drawerContainer.innerHTML = tabs.map(t => `
    <div class="drawer-item ${t.id===currentTab?'active':''}" data-tab="${t.id}" onclick="switchTab('${t.id}'); toggleDrawer();">
      <span>${t.icon}</span> ${t.label}
      <span class="badge" id="drawer_badge_${t.id}">0</span>
    </div>
  `).join('');
  updateBadges();
}

function switchTab(tab) {
  if(currentTab===tab) return;
  currentTab = tab;
  renderTabs();
  renderContent();
  updateBadges();
}

function switchRole(role) {
  state.currentRole = role;
  document.getElementById('roleSelect').value = role;
  const adminBtn = document.getElementById('adminBtn');
  const drawerAdminBtn = document.getElementById('drawerAdminBtn');
  if(role === 'senior') { adminBtn.classList.add('visible'); drawerAdminBtn.style.display = 'flex'; }
  else { adminBtn.classList.remove('visible'); drawerAdminBtn.style.display = 'none'; }
  saveState();
  renderContent();
  updateBadges();
}

function updateBadges() {
  const pending = state.tasks.filter(t => !t.done && (t.assignee === state.currentRole || state.currentRole === 'senior')).length;
  const urgent = state.handovers.filter(h => h.urgent && !h.acknowledged).length;
  const unread = state.teamMessages.filter(m => !m.read).length;
  ['tasks','handover','team'].forEach(id => {
    const b = document.getElementById(`badge_${id}`);
    const db = document.getElementById(`drawer_badge_${id}`);
    const count = id==='tasks'?pending : id==='handover'?urgent : unread;
    if(b){ b.style.display=count?'block':'none'; b.textContent=count; }
    if(db){ db.style.display=count?'block':'none'; db.textContent=count; }
  });
}

// ─── 7. البحث العالمي ───
function searchGlobal(query) {
  state.searchQuery = query.toLowerCase();
  renderContent();
}

function filterBySearch(items, fields) {
  if(!state.searchQuery) return items;
  return items.filter(item => fields.some(f => item[f] && item[f].toString().toLowerCase().includes(state.searchQuery)));
}

// ─── 8. التصيير الرئيسي ───
function renderContent() {
  const container = document.getElementById('appContent');
  container.innerHTML = '';
  // Dashboard دائماً في الأعلى
  renderDashboard(container);
  // المحتوى حسب التبويب
  switch(currentTab) {
    case 'dashboard': renderDashboardFull(container); break;
    case 'ward': renderWard(container); break;
    case 'clinic': renderClinic(container); break;
    case 'tasks': renderTasks(container); break;
    case 'team': renderTeam(container); break;
    case 'handover': renderHandover(container); break;
    case 'reports': renderReports(container); break;
  }
  updateBadges();
}

function renderDashboard(container) {
  const active = state.patients.filter(p => p.status !== 'discharged').length;
  const pending = state.tasks.filter(t => !t.done).length;
  const critical = state.patients.filter(p => p.workflowStage === 3 && p.status==='admitted').length;
  const urgent = state.handovers.filter(h => h.urgent && !h.acknowledged).length;
  container.innerHTML += `
    <div class="dashboard">
      <div class="stat-card primary"><div class="stat-number">${active}</div><div class="stat-label">🩺 مرضى نشطون</div></div>
      <div class="stat-card warning"><div class="stat-number">${pending}</div><div class="stat-label">📋 مهام معلقة</div></div>
      <div class="stat-card danger"><div class="stat-number">${critical}</div><div class="stat-label">🚨 تنفيذ (حرج)</div></div>
      <div class="stat-card secondary"><div class="stat-number">${urgent}</div><div class="stat-label">📝 تسليم عاجل</div></div>
      <div class="stat-card success" style="grid-column: span 2;"><div class="stat-number">${state.patients.length}</div><div class="stat-label">🏥 إجمالي المرضى</div></div>
    </div>
  `;
}

function renderDashboardFull(container) {
  // عرض موجز للمرضى حسب المرحلة
  const stages = ['الاستقبال', 'الخطة', 'التنفيذ', 'الخروج'];
  const counts = [0,0,0,0];
  state.patients.filter(p => p.status !== 'discharged').forEach(p => {
    if(p.workflowStage>=1 && p.workflowStage<=4) counts[p.workflowStage-1]++;
  });
  container.innerHTML += `
    <div class="card"><div class="title">📈 توزيع المرضى حسب المرحلة</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px;">
        ${stages.map((s,i) => `<div><span class="status-badge stage${i+1}">${s}</span> ${counts[i]} مريض</div>`).join('')}
      </div>
    </div>
    <div class="card"><div class="title">📋 آخر المهام</div>
      ${state.tasks.filter(t=>!t.done).slice(0,3).map(t => `<div style="font-size:13px;padding:4px 0;border-bottom:1px solid #e2e8f0;">${t.text} (${getRoleLabel(t.assignee)})</div>`).join('')||'<div class="text-muted">لا توجد مهام معلقة</div>'}
    </div>
  `;
}

// ─── 9. الجناح (Ward) مع سير العمل ───
function renderWard(container) {
  let active = state.patients.filter(p => p.status !== 'discharged');
  active = filterBySearch(active, ['name','diagnosis','bed']);
  const discharged = state.patients.filter(p => p.status === 'discharged');
  let html = `
    <div class="flex-between mb-8"><h2 style="font-size:18px;">🏥 الجناح</h2>
      ${hasPermission(state.currentRole,'admit') ? `<button class="small" onclick="showAdmissionWizard()">➕ قبول</button>` : ''}
    </div>
    <div class="text-muted text-sm">👥 ${active.length} مريض نشط · ${discharged.length} مكتمل</div>
  `;
  if(!active.length) {
    html += `<div class="empty-state"><div class="emoji">🛏️</div><p>${state.searchQuery?'لا توجد نتائج بحث':'لا يوجد مرضى نشطين'}</p></div>`;
  } else {
    active.forEach(p => {
      const stage = p.workflowStage || 1;
      const stageLabels = ['الاستقبال', 'الخطة', 'التنفيذ', 'الخروج'];
      const stageClass = `stage${stage}`;
      html += `
        <div class="card clickable" onclick="viewPatient('${p.id}')" style="border-right-color:${stage===3?'var(--danger)':stage===2?'var(--warning)':'var(--primary)'};">
          <div class="flex-between">
            <div><div class="title">${p.name} <span class="text-muted text-sm">(${p.age}س)</span></div>
            <div class="sub">${p.diagnosis} · سرير ${p.bed}</div></div>
            <span class="status-badge ${stageClass}">${stageLabels[stage-1]}</span>
          </div>
          <div class="meta"><span>⚖️ ${p.weight}كجم</span><span>🩺 ${p.vitals || '—'}</span></div>
          <div class="actions">
            ${hasPermission(state.currentRole,'update_vitals') ? `<button class="small secondary" onclick="event.stopPropagation();updateVitals('${p.id}')">📊 فحوصات</button>` : ''}
            ${hasPermission(state.currentRole,'write_notes') ? `<button class="small secondary" onclick="event.stopPropagation();addNote('${p.id}')">📝 ملاحظة</button>` : ''}
            ${hasPermission(state.currentRole,'discharge') ? `<button class="small danger" onclick="event.stopPropagation();dischargePatient('${p.id}')">⬆️ خروج</button>` : ''}
            ${hasPermission(state.currentRole,'approve_plan') ? `<button class="small secondary" onclick="event.stopPropagation();advanceStage('${p.id}')">➡️ تقدم</button>` : ''}
          </div>
        </div>
      `;
    });
  }
  if(discharged.length) {
    html += `<details style="margin-top:8px;"><summary style="cursor:pointer;font-weight:600;color:var(--gray);font-size:12px;">✅ مكتمل (${discharged.length})</summary>`;
    discharged.forEach(p => {
      html += `<div class="card" style="border-right-color:var(--gray);opacity:0.6;"><div class="flex-between"><span class="title" style="font-size:13px;">${p.name}</span><span class="status-badge discharged">مكتمل</span></div><div class="sub">${p.diagnosis} · ${p.age}س</div></div>`;
    });
    html += `</details>`;
  }
  container.innerHTML += html;
}

// ─── 10. إدارة سير العمل (Workflow) ───
function advanceStage(id) {
  const p = state.patients.find(pt => pt.id === id);
  if(!p) return;
  if(p.workflowStage >= 4) { showToast('⚠️ المريض في المرحلة النهائية'); return; }
  p.workflowStage = (p.workflowStage || 1) + 1;
  p.updatedAt = Date.now();
  addAuditLog('تقدم المرحلة', `${p.name} → المرحلة ${p.workflowStage}`);
  saveState();
  renderContent();
  showToast(`✅ تم تقدم ${p.name} إلى المرحلة ${p.workflowStage}`);
}

// ─── 11. عرض تفاصيل المريض (Snapshot مع سير العمل) ───
let selectedPatient = null;

function viewPatient(id) {
  const p = state.patients.find(pt => pt.id === id);
  if(!p) return;
  selectedPatient = p;
  const stageLabels = ['الاستقبال والتقييم', 'وضع الخطة العلاجية', 'التنفيذ والمتابعة', 'الخروج والمتابعة'];
  const stageEmojis = ['📥', '📋', '⚕️', '🚪'];
  let html = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
      <button class="small secondary" onclick="closeModal()">← رجوع</button>
      <h2 style="margin:0;">${p.name}</h2>
      <span class="text-muted text-sm">${p.age}س · ${p.weight}كجم</span>
    </div>
    <div class="workflow-progress">
      ${[1,2,3,4].map(s => `
        <div class="workflow-step">
          <div class="step-circle ${s === p.workflowStage ? 'active' : s < p.workflowStage ? 'done' : ''}">${s < p.workflowStage ? '✓' : s}</div>
          <div class="step-label">${stageEmojis[s-1]} ${stageLabels[s-1].split(' ')[0]}</div>
        </div>
      `).join('')}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0;">
      <div><b>التشخيص</b><br>${p.diagnosis}</div>
      <div><b>السرير</b><br>${p.bed}</div>
      <div><b>الفحوصات</b><br>${p.vitals || '—'}</div>
      <div><b>الأدوية</b><br>${p.meds || '—'}</div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;">
      ${hasPermission(state.currentRole,'update_vitals') ? `<button class="small secondary" onclick="updateVitals('${p.id}');closeModal();">📊 فحوصات</button>` : ''}
      ${hasPermission(state.currentRole,'write_notes') ? `<button class="small secondary" onclick="addNote('${p.id}');closeModal();">📝 ملاحظة</button>` : ''}
      ${hasPermission(state.currentRole,'approve_plan') && p.workflowStage < 4 ? `<button class="small secondary" onclick="advanceStage('${p.id}');closeModal();">➡️ تقدم</button>` : ''}
      ${hasPermission(state.currentRole,'discharge') ? `<button class="small danger" onclick="dischargePatient('${p.id}');closeModal();">⬆️ خروج</button>` : ''}
    </div>
    <div class="card" style="margin-top:8px;border-right-color:var(--gray);"><div class="title">📝 الملاحظات</div>
      <div style="font-size:13px;max-height:120px;overflow-y:auto;">${p.notes || 'لا توجد ملاحظات'}</div>
    </div>
  `;
  openModal(html);
}

// ─── 12. دوال الإجراءات (Admit, Vitals, Notes, Discharge) ───
function showAdmissionWizard() {
  let wizardData = {};
  let step = 1;
  const render = (s) => {
    let html = `
      <h2>➕ قبول مريض جديد</h2>
      <div class="wizard-progress">
        ${[1,2,3].map(st => `<div class="step-indicator"><div class="step-circle ${st===s?'active':st<s?'done':''}">${st<s?'✓':st}</div><div class="step-label">${st===1?'أساسية':st===2?'سريرية':'تاريخ'}</div></div>`).join('')}
      </div>
      <div class="wizard-step ${s===1?'active':''}" data-step="1">
        <label>الاسم *</label><input id="admName" value="${wizardData.name||''}" placeholder="مثال: نور الهاشمي">
        <div class="form-row"><div><label>العمر (سنة) *</label><input id="admAge" type="number" value="${wizardData.age||''}" placeholder="3"></div><div><label>الوزن (كجم) *</label><input id="admWeight" type="number" step="0.1" value="${wizardData.weight||''}" placeholder="14"></div></div>
        <div class="form-row"><div><label>الطول (سم)</label><input id="admHeight" type="number" step="0.1" value="${wizardData.height||''}" placeholder="95"></div><div><label>السرير *</label><input id="admBed" value="${wizardData.bed||''}" placeholder="مثال: PICU-2"></div></div>
        <button onclick="wizardNext(1)" class="block">التالي →</button>
      </div>
      <div class="wizard-step ${s===2?'active':''}" data-step="2">
        <label>التشخيص *</label><input id="admDiagnosis" value="${wizardData.diagnosis||''}" placeholder="مثال: التهاب القصيبات">
        <label>مصدر الدخول</label><select id="admSource" class="form-input"><option value="ER">الطوارئ</option><option value="OPD">العيادة</option><option value="Transfer">تحويل</option></select>
        <div style="display:flex;gap:8px;margin-top:8px;"><button onclick="wizardPrev(2)" class="secondary">← السابق</button><button onclick="wizardNext(2)" class="block" style="flex:1;">التالي →</button></div>
      </div>
      <div class="wizard-step ${s===3?'active':''}" data-step="3">
        <label>التاريخ المرضي والفحص</label><textarea id="admHistory" placeholder="الملاحظات السريرية...">${wizardData.history||''}</textarea>
        <div style="display:flex;gap:8px;margin-top:8px;"><button onclick="wizardPrev(3)" class="secondary">← السابق</button><button onclick="wizardSubmit()" class="success" style="flex:1;">✅ قبول</button></div>
      </div>
    `;
    openModal(html);
  };
  window.wizardNext = (s) => {
    if(s===1) {
      wizardData.name = document.getElementById('admName')?.value||'';
      wizardData.age = document.getElementById('admAge')?.value||'';
      wizardData.weight = document.getElementById('admWeight')?.value||'';
      wizardData.height = document.getElementById('admHeight')?.value||'';
      wizardData.bed = document.getElementById('admBed')?.value||'';
      if(!wizardData.name || !wizardData.age || !wizardData.weight || !wizardData.bed) { alert('⚠️ الحقول المطلوبة'); return; }
    } else if(s===2) {
      wizardData.diagnosis = document.getElementById('admDiagnosis')?.value||'';
      wizardData.source = document.getElementById('admSource')?.value||'ER';
      if(!wizardData.diagnosis) { alert('⚠️ التشخيص مطلوب'); return; }
    }
    render(s+1);
  };
  window.wizardPrev = (s) => {
    if(s===2) { wizardData.diagnosis = document.getElementById('admDiagnosis')?.value||''; wizardData.source = document.getElementById('admSource')?.value||'ER'; }
    else if(s===3) { wizardData.history = document.getElementById('admHistory')?.value||''; }
    render(s-1);
  };
  window.wizardSubmit = () => {
    wizardData.history = document.getElementById('admHistory')?.value||'';
    const {name, age, weight, height, bed, diagnosis, source, history} = wizardData;
    if(!name || isNaN(parseFloat(age)) || parseFloat(age)<=0 || isNaN(parseFloat(weight)) || parseFloat(weight)<=0 || !bed || !diagnosis) {
      alert('⚠️ جميع الحقول المطلوبة يجب تعبئتها بشكل صحيح');
      return;
    }
    const id = 'p'+uid();
    state.patients.push({
      id, name, age:parseFloat(age), weight:parseFloat(weight), height:parseFloat(height)||null,
      bed, diagnosis, status:'admitted', vitals:'', fluids:'', meds:'',
      notes:history||'', admissionDate:today(), dischargeDate:null,
      source, workflowStage:1,
      dischargeChecklist:{summary:false, meds:false, followUp:false, education:false, signature:false},
      vitalsHistory:[], updatedAt:Date.now()
    });
    state.tasks.push({
      id:'t'+uid(), text:`تقييم كامل لـ ${name}`, priority:'high', assignee:'junior', done:false,
      createdAt:today(), dueDate:today(), dueTime:timeNow(), reminded:false, updatedAt:Date.now()
    });
    addAuditLog('قبول مريض', `تم قبول ${name}`);
    saveState();
    closeModal();
    renderContent();
    showToast(`✅ تم قبول ${name}`);
  };
  render(1);
}

function updateVitals(id) {
  const val = prompt('أدخل الفحوصات (مثال: T:37.5 HR:130 SpO₂:96%):');
  if(val===null) return;
  const p = state.patients.find(pt => pt.id === id);
  if(p) {
    if(!p.vitalsHistory) p.vitalsHistory = [];
    p.vitalsHistory.push({timestamp:new Date().toISOString(), vitals:val});
    p.vitals = val;
    p.updatedAt = Date.now();
    addAuditLog('تحديث فحوصات', `تم تحديث فحوصات ${p.name} إلى ${val}`);
    saveState();
    renderContent();
    showToast('✅ تم تحديث الفحوصات');
  }
}

function addNote(id) {
  const note = prompt('أضف ملاحظة سريرية:');
  if(!note) return;
  const p = state.patients.find(pt => pt.id === id);
  if(p) {
    p.notes = (p.notes||'') + '\n' + today() + ' ' + timeNow() + ': ' + note;
    p.updatedAt = Date.now();
    addAuditLog('إضافة ملاحظة', `أضاف ملاحظة لـ ${p.name}: ${note}`);
    saveState();
    renderContent();
    showToast('📝 تم إضافة الملاحظة');
  }
}

function dischargePatient(id) {
  const p = state.patients.find(pt => pt.id === id);
  if(!p) return;
  // التحقق من اكتمال المرحلة 4
  if(p.workflowStage < 4) { alert('⚠️ يجب إكمال جميع مراحل سير العمل قبل الخروج'); return; }
  openModal(`
    <h2>📋 خروج المريض: ${p.name}</h2>
    <div style="margin:12px 0;background:#f8fafc;padding:12px;border-radius:8px;"><p style="font-size:13px;color:#475569;">يرجى التأكد من استكمال جميع البنود</p></div>
    <div style="margin:10px 0;">
      <label class="check-label"><input type="checkbox" id="dcSummary" ${p.dischargeChecklist?.summary?'checked':''}> ✅ ملخص الخروج</label>
      <label class="check-label"><input type="checkbox" id="dcMeds" ${p.dischargeChecklist?.meds?'checked':''}> ✅ شرح الأدوية</label>
      <label class="check-label"><input type="checkbox" id="dcFollow" ${p.dischargeChecklist?.followUp?'checked':''}> ✅ موعد المتابعة</label>
      <label class="check-label"><input type="checkbox" id="dcEducation" ${p.dischargeChecklist?.education?'checked':''}> ✅ تثقيف المريض</label>
      <label class="check-label"><input type="checkbox" id="dcSignature" ${p.dischargeChecklist?.signature?'checked':''}> ✅ توقيع الطبيب</label>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <button onclick="saveDischargeChecklist('${p.id}')" class="secondary small">💾 حفظ</button>
      <button onclick="finalizeDischarge('${p.id}')" class="success" style="flex:1;">✍️ تأكيد الخروج</button>
    </div>
  `);
  window.saveDischargeChecklist = (pid) => {
    const p2 = state.patients.find(pt => pt.id === pid);
    if(!p2) return;
    p2.dischargeChecklist = {
      summary: document.getElementById('dcSummary').checked,
      meds: document.getElementById('dcMeds').checked,
      followUp: document.getElementById('dcFollow').checked,
      education: document.getElementById('dcEducation').checked,
      signature: document.getElementById('dcSignature').checked
    };
    p2.updatedAt = Date.now();
    addAuditLog('تحديث قائمة الخروج', `تم تحديث قائمة خروج ${p2.name}`);
    saveState();
    showToast('✅ تم حفظ القائمة');
  };
  window.finalizeDischarge = (pid) => {
    const p2 = state.patients.find(pt => pt.id === pid);
    if(!p2) return;
    const allChecked = ['dcSummary','dcMeds','dcFollow','dcEducation','dcSignature'].every(id => document.getElementById(id).checked);
    if(!allChecked) { alert('⚠️ يجب استكمال جميع بنود القائمة'); return; }
    if(!confirm(`تأكيد خروج ${p2.name}؟`)) return;
    p2.status = 'discharged';
    p2.dischargeDate = today();
    p2.updatedAt = Date.now();
    addAuditLog('خروج مريض', `تم خروج ${p2.name}`);
    state.tasks.push({
      id:'t'+uid(), text:`ملخص خروج ${p2.name}`, priority:'medium', assignee:'junior', done:true,
      createdAt:today(), dueDate:today(), dueTime:timeNow(), reminded:false, updatedAt:Date.now()
    });
    saveState();
    closeModal();
    renderContent();
    showToast(`⬆️ تم خروج ${p2.name}`);
  };
}

// ─── 13. بقية الأقسام (Clinic, Tasks, Team, Handover, Reports) ───
// (مختصرة لكنها تعمل بنفس المنطق مع استخدام الصلاحيات)

function renderClinic(container) {
  let slots = filterBySearch(state.clinicSlots, ['patientName','reason']);
  let html = `<div class="flex-between mb-8"><h2 style="font-size:18px;">🩺 العيادة</h2>${hasPermission(state.currentRole,'manage_clinic') ? `<button class="small" onclick="addClinicSlot()">➕ إضافة</button>` : ''}</div>`;
  if(!slots.length) html += `<div class="empty-state"><div class="emoji">📋</div><p>${state.searchQuery?'لا توجد نتائج':'لا توجد مواعيد'}</p></div>`;
  else slots.forEach(s => {
    html += `<div class="card" style="border-right-color:${s.status==='مكتمل'?'var(--success)':'var(--warning)'};"><div class="flex-between"><div><div class="title">${s.patientName}</div><div class="sub">⏰ ${s.time} · ${s.age} سنة · ${s.reason}</div></div><span class="status-badge ${s.status==='مكتمل'?'completed':'waiting'}">${s.status}</span></div>${hasPermission(state.currentRole,'manage_clinic') ? `<div class="actions"><button class="small secondary" onclick="updateClinicStatus('${s.id}','مكتمل')">✅ مكتمل</button><button class="small danger" onclick="removeClinicSlot('${s.id}')">🗑️</button></div>` : ''}</div>`;
  });
  container.innerHTML += html;
}
function addClinicSlot() {
  const t=prompt('الوقت:'), n=prompt('الاسم:'), a=prompt('العمر:'), r=prompt('السبب:'); if(!t||!n||!a||!r) return;
  state.clinicSlots.push({id:'c'+uid(), time:t, patientName:n, age:parseInt(a), reason:r, status:'انتظار', updatedAt:Date.now()});
  addAuditLog('إضافة موعد', `موعد لـ ${n}`); saveState(); renderContent(); showToast('✅ تمت الإضافة');
}
function updateClinicStatus(id, status) {
  const s=state.clinicSlots.find(slot=>slot.id===id); if(s){s.status=status; s.updatedAt=Date.now(); addAuditLog('تحديث موعد', `${s.patientName} → ${status}`); saveState(); renderContent(); showToast('✅ تم التحديث');}
}
function removeClinicSlot(id) { if(!confirm('حذف؟')) return; const s=state.clinicSlots.find(slot=>slot.id===id); state.clinicSlots=state.clinicSlots.filter(slot=>slot.id!==id); if(s) addAuditLog('حذف موعد', `حذف موعد ${s.patientName}`); saveState(); renderContent(); }

function renderTasks(container) {
  let tasks = filterBySearch(state.tasks.filter(t=>!t.done), ['text']);
  let doneTasks = filterBySearch(state.tasks.filter(t=>t.done), ['text']);
  let html = `<div class="flex-between mb-8"><h2 style="font-size:18px;">📋 المهام</h2>${hasPermission(state.currentRole,'create_task') ? `<button class="small" onclick="addTask()">➕ إضافة</button>` : ''}</div>`;
  if(!tasks.length) html += `<div class="empty-state"><div class="emoji">✅</div><p>${state.searchQuery?'لا توجد نتائج':'لا توجد مهام معلقة'}</p></div>`;
  else tasks.forEach(t => {
    const isMine = t.assignee === state.currentRole || state.currentRole === 'senior';
    const isOverdue = t.dueDate && t.dueDate < today() && !t.done;
    const isSoon = t.dueDate && t.dueDate === today() && !t.done;
    let tagClass = t.priority; if(isOverdue) tagClass='overdue'; else if(isSoon) tagClass='soon';
    const dueDisplay = t.dueDate ? (t.dueTime ? `${t.dueDate} ${t.dueTime}` : t.dueDate) : '';
    html += `<div class="card" style="border-right-color:${isOverdue?'var(--danger)':isSoon?'var(--warning)':t.priority==='high'?'var(--danger)':t.priority==='medium'?'var(--warning)':'var(--gray)'};">
      <div class="flex-between"><span class="title" style="font-size:14px;">${t.text} ${isOverdue?'⏰':isSoon?'🕐':''}</span><span class="tag ${tagClass}">${isOverdue?'متأخرة':isSoon?'مستحقة قريباً':t.priority}</span></div>
      <div class="sub">👤 ${getRoleLabel(t.assignee)} · ${t.createdAt||''} ${dueDisplay?'· استحقاق: '+dueDisplay:''}</div>
      ${isMine ? `<div class="actions"><button class="small" onclick="toggleTask('${t.id}')">✅ إنجاز</button></div>` : ''}
    </div>`;
  });
  if(doneTasks.length) {
    html += `<details style="margin-top:8px;"><summary style="cursor:pointer;font-weight:600;color:var(--gray);font-size:12px;">✅ منجزة (${doneTasks.length})</summary>`;
    doneTasks.forEach(t => { html += `<div class="card" style="border-right-color:var(--success);opacity:0.5;"><div class="flex-between"><span style="font-size:13px;">${t.text}</span><span class="done-badge">✓</span></div></div>`; });
    html += `</details>`;
  }
  container.innerHTML += html;
}
function addTask() {
  const text=prompt('وصف المهمة:'); if(!text) return;
  const assignee=prompt('المسؤول (senior/junior/nurse):')||'junior';
  const priority=prompt('الأولوية (high/medium/low):')||'medium';
  const dueDate=prompt('تاريخ الاستحقاق (YYYY-MM-DD):')||today();
  const dueTime=prompt('وقت الاستحقاق (HH:MM):')||timeNow();
  state.tasks.push({id:'t'+uid(), text, priority:priority.toLowerCase(), assignee:assignee.toLowerCase(), done:false, createdAt:today(), dueDate, dueTime, reminded:false, updatedAt:Date.now()});
  addAuditLog('إضافة مهمة', `${text} لـ ${assignee}`); saveState(); renderContent(); showToast('📋 تمت الإضافة');
}
function toggleTask(id) {
  const t=state.tasks.find(task=>task.id===id); if(t){t.done=!t.done; t.updatedAt=Date.now(); addAuditLog('تحديث مهمة', `${t.text} ${t.done?'تم إنجازها':'أعيد فتحها'}`); saveState(); renderContent(); showToast(t.done?'✅ تم إنجاز المهمة':'🔄 أعيد فتح المهمة');}
}

function renderTeam(container) {
  let messages = filterBySearch(state.teamMessages, ['sender','text']);
  let html = `<div class="flex-between mb-8"><h2 style="font-size:18px;">👥 الفريق</h2><span class="text-muted">${state.teamMembers.length} أعضاء</span></div>
    <div class="member-list">${state.teamMembers.map(m => `<span class="member">${getRoleEmoji(m.role)} ${m.name} <span class="role-tag">${getRoleLabel(m.role)}</span>${m.role===state.currentRole?'⭐':''}</span>`).join('')}</div>
    <div style="margin:10px 0;"><h3 style="font-size:14px;margin-bottom:4px;">💬 المحادثة</h3></div>`;
  if(!messages.length) html += `<div class="empty-state"><div class="emoji">💬</div><p>${state.searchQuery?'لا توجد نتائج':'لا توجد رسائل'}</p></div>`;
  else messages.slice().reverse().forEach(m => { html += `<div class="message"><div class="flex-between"><span class="sender">${m.sender}</span><span class="time">${m.time}</span></div><div class="text">${m.text}</div></div>`; });
  html += `<div style="display:flex;gap:6px;margin-top:6px;"><textarea id="teamMsgInput" placeholder="اكتب رسالة..." style="flex:1;min-height:40px;margin:0;"></textarea><button onclick="sendTeamMsg()" style="align-self:flex-end;">إرسال</button></div>`;
  container.innerHTML += html;
}
function sendTeamMsg() {
  const input=document.getElementById('teamMsgInput'); if(!input) return; const msg=input.value.trim(); if(!msg) return;
  const sender=state.teamMembers.find(m=>m.role===state.currentRole)?.name||getRoleLabel(state.currentRole);
  state.teamMessages.push({sender, text:msg, time:timeNow(), read:false, updatedAt:Date.now()});
  addAuditLog('رسالة فريق', `${sender}: ${msg}`); input.value=''; saveState(); renderContent(); showToast('💬 تم الإرسال');
}

function renderHandover(container) {
  let handovers = filterBySearch(state.handovers, ['situation','background','assessment','recommendation','author','patientName']);
  let html = `<div class="flex-between mb-8"><h2 style="font-size:18px;">📝 التسليم</h2>${hasPermission(state.currentRole,'create_handover') ? `<button class="small" onclick="createHandover()">➕ جديد</button>` : ''}</div>`;
  const sorted = [...handovers].sort((a,b) => (a.urgent&&!a.acknowledged)?-1:(b.urgent&&!b.acknowledged)?1:0);
  if(!sorted.length) html += `<div class="empty-state"><div class="emoji">📄</div><p>${state.searchQuery?'لا توجد نتائج':'لا يوجد تسليم'}</p></div>`;
  else sorted.forEach(h => {
    const isUrgent = h.urgent && !h.acknowledged;
    html += `<div class="card" style="border-right-color:${isUrgent?'var(--danger)':'var(--primary)'};">
      <div class="flex-between"><span class="title" style="font-size:13px;">${h.date} · ${h.author}</span>
      <div>${isUrgent?'<span class="urgent-badge" style="background:var(--danger);color:white;padding:1px 8px;border-radius:30px;font-size:10px;">🚨 عاجل</span>':''}${h.acknowledged?'<span class="done-badge" style="background:var(--success);color:white;padding:1px 8px;border-radius:30px;font-size:10px;">✓ تم الاستلام</span>':''}</div></div>
      ${h.patientName ? `<div class="sub">👤 المريض: ${h.patientName}</div>` : ''}
      <div style="font-size:12px;margin-top:4px;"><div><b>S:</b> ${h.situation}</div><div><b>B:</b> ${h.background}</div><div><b>A:</b> ${h.assessment}</div><div><b>R:</b> ${h.recommendation}</div></div>
      ${!h.acknowledged ? `<div class="actions"><button class="small" onclick="acknowledgeHandover('${h.id}')">✓ استلام</button></div>` : ''}
    </div>`;
  });
  container.innerHTML += html;
}
function createHandover() {
  openModal(`
    <h2>📝 تسليم جديد (SBAR)</h2>
    <div style="margin-bottom:10px;background:#f8fafc;padding:8px;border-radius:8px;font-size:13px;color:var(--gray);">⚠️ جميع الحقول مطلوبة</div>
    <label>المريض</label><select id="hoPatient" class="form-input"><option value="">اختر مريضاً (اختياري)</option>${state.patients.filter(p=>p.status!=='discharged').map(p=>`<option value="${p.id}">${p.name} (${p.diagnosis})</option>`).join('')}</select>
    <label>الموقف (S) *</label><input id="hoS" placeholder="ماذا يحدث؟">
    <label>الخلفية (B) *</label><input id="hoB" placeholder="التاريخ المرضي؟">
    <label>التقييم (A) *</label><input id="hoA" placeholder="التشخيص؟">
    <label>التوصية (R) *</label><input id="hoR" placeholder="ماذا نفعل؟">
    <label class="check-label" style="margin-top:4px;"><input type="checkbox" id="hoUrgent"> 🚨 عاجل</label>
    <div style="display:flex;gap:8px;margin-top:10px;"><button onclick="saveHandover()">حفظ</button><button class="secondary" onclick="closeModal()">إلغاء</button></div>
  `);
  window.saveHandover = () => {
    const s=document.getElementById('hoS').value.trim(), b=document.getElementById('hoB').value.trim(), a=document.getElementById('hoA').value.trim(), r=document.getElementById('hoR').value.trim();
    const urgent=document.getElementById('hoUrgent').checked;
    const patientId=document.getElementById('hoPatient').value;
    if(!s||!b||!a||!r) { alert('⚠️ جميع حقول SBAR مطلوبة'); return; }
    const patient = state.patients.find(p=>p.id===patientId);
    state.handovers.push({id:'h'+uid(), date:today(), author:getRoleLabel(state.currentRole), patientId:patientId||null, patientName:patient?patient.name:null, situation:s, background:b, assessment:a, recommendation:r, urgent, acknowledged:false, updatedAt:Date.now()});
    addAuditLog('تسليم جديد', `تم إنشاء تسليم من ${state.currentRole}${patient?' لـ '+patient.name:''}`);
    saveState(); closeModal(); renderContent(); showToast('📝 تم حفظ التسليم');
  };
}
function acknowledgeHandover(id) {
  const h=state.handovers.find(handover=>handover.id===id); if(h){h.acknowledged=true; h.updatedAt=Date.now(); addAuditLog('استلام تسليم', `تم استلام تسليم من ${h.author}`); saveState(); renderContent(); showToast('✅ تم الاستلام');}
}

function renderReports(container) {
  const total=state.patients.length, active=state.patients.filter(p=>p.status!=='discharged').length, discharged=state.patients.filter(p=>p.status==='discharged').length;
  const stageCounts = [0,0,0,0];
  state.patients.filter(p=>p.status!=='discharged').forEach(p => { if(p.workflowStage>=1&&p.workflowStage<=4) stageCounts[p.workflowStage-1]++; });
  const pendingTasks=state.tasks.filter(t=>!t.done).length;
  const doneTasks=state.tasks.filter(t=>t.done).length;
  const tasksByRole = {}; state.tasks.forEach(t=>{ if(!tasksByRole[t.assignee]) tasksByRole[t.assignee]=0; tasksByRole[t.assignee]++; });
  let html = `<h2 style="font-size:18px;margin-bottom:12px;">📊 التقارير المتقدمة</h2>
    <div class="dashboard"><div class="stat-card primary"><div class="stat-number">${total}</div><div class="stat-label">🏥 الإجمالي</div></div>
    <div class="stat-card success"><div class="stat-number">${active}</div><div class="stat-label">🩺 نشطون</div></div>
    <div class="stat-card secondary"><div class="stat-number">${discharged}</div><div class="stat-label">✅ مكتمل</div></div>
    <div class="stat-card warning"><div class="stat-number">${pendingTasks}</div><div class="stat-label">📋 مهام معلقة</div></div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">
      <div class="card" style="border-right-color:var(--primary);"><div class="title">📋 المهام</div><div>المعلقة: ${pendingTasks}</div><div>المنجزة: ${doneTasks}</div></div>
      <div class="card" style="border-right-color:var(--secondary);"><div class="title">👥 حسب الدور</div>${Object.entries(tasksByRole).map(([role,count])=>`<div>${getRoleLabel(role)}: ${count}</div>`).join('')}</div>
    </div>
    <div class="card" style="border-right-color:var(--info);"><div class="title">🔄 توزيع المرضى حسب المرحلة</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;">${['الاستقبال','الخطة','التنفيذ','الخروج'].map((s,i)=>`<div><span class="status-badge stage${i+1}">${s}</span> ${stageCounts[i]}</div>`).join('')}</div>
    </div>
    <div class="card" style="border-right-color:var(--gray);"><div class="title">📜 سجل التدقيق (آخر 5)</div>
      ${state.auditLog.slice(-5).reverse().map(log => `<div style="font-size:12px;border-bottom:1px solid #e2e8f0;padding:4px 0;"><span class="text-muted">${new Date(log.timestamp).toLocaleString()}</span> <span class="role-tag">${getRoleLabel(log.user)}</span> <span>${log.action}</span> <span style="color:var(--gray);">${log.details}</span></div>`).join('')}
      ${state.auditLog.length===0?'<div class="text-muted">لا توجد سجلات</div>':''}
    </div>
  `;
  container.innerHTML += html;
}

// ─── 14. الإدارة ───
function adminOpenPanel() {
  if(state.currentRole !== 'senior') { showToast('⚠️ هذه اللوحة للاستشاري فقط'); return; }
  let html = `<h2>🔑 إدارة الفريق</h2><h3>الأعضاء الحاليون</h3>`;
  state.teamMembers.forEach(m => {
    html += `<div class="card" style="border-right-color:#8b5cf6;padding:10px;"><div class="flex-between"><span><b>${m.name}</b> <span class="role-tag">${getRoleLabel(m.role)}</span></span><span class="text-muted">${m.id}</span></div><div class="actions"><button class="small secondary" onclick="changeMemberRole('${m.id}')">🔄 تغيير الدور</button><button class="small danger" onclick="removeMember('${m.id}')">🗑️ حذف</button></div></div>`;
  });
  html += `<h3>➕ إضافة عضو جديد</h3><label>الاسم</label><input id="newMemberName" placeholder="مثال: د. فاطمة"><label>الدور</label><select id="newMemberRole" class="form-input"><option value="junior">طبيب مبتدئ</option><option value="nurse">ممرض</option><option value="admin">إداري</option></select><div style="display:flex;gap:8px;margin-top:8px;"><button onclick="addMember()">➕ إضافة</button><button class="secondary" onclick="closeModal()">إغلاق</button></div>`;
  openModal(html);
  window.addMember = () => {
    const name = document.getElementById('newMemberName').value.trim();
    const role = document.getElementById('newMemberRole').value;
    if(!name){ alert('الاسم مطلوب'); return; }
    state.teamMembers.push({id:'u'+uid(), name, role, updatedAt:Date.now()});
    addAuditLog('إضافة عضو', `تم إضافة ${name} بدور ${role}`);
    saveState(); closeModal(); renderContent(); showToast(`✅ تم إضافة ${name}`);
  };
  window.changeMemberRole = (id) => {
    const m=state.teamMembers.find(member=>member.id===id); if(!m) return;
    const newRole=prompt('الدور الجديد (senior/junior/nurse/admin):', m.role);
    if(newRole && ['senior','junior','nurse','admin'].includes(newRole)) { m.role=newRole; m.updatedAt=Date.now(); addAuditLog('تغيير دور', `تم تغيير دور ${m.name} إلى ${newRole}`); saveState(); closeModal(); renderContent(); showToast('🔄 تم التحديث'); }
  };
  window.removeMember = (id) => {
    if(!confirm('حذف هذا العضو؟')) return;
    const m=state.teamMembers.find(member=>member.id===id);
    state.teamMembers=state.teamMembers.filter(member=>member.id!==id);
    if(m) addAuditLog('حذف عضو', `تم حذف ${m.name}`);
    saveState(); closeModal(); renderContent(); showToast('🗑️ تم الحذف');
  };
}

// ─── 15. تصدير واستيراد ───
window.exportData = function() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `PaedsWard_Backup_${today()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('📤 تم تصدير البيانات');
};
window.importData = function(event) {
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if(data.patients) state.patients = data.patients;
      if(data.tasks) state.tasks = data.tasks;
      if(data.handovers) state.handovers = data.handovers;
      if(data.clinicSlots) state.clinicSlots = data.clinicSlots;
      if(data.teamMessages) state.teamMessages = data.teamMessages;
      if(data.teamMembers) state.teamMembers = data.teamMembers;
      if(data.auditLog) state.auditLog = data.auditLog;
      state.lastSync = Date.now();
      addAuditLog('استيراد بيانات', 'تم استيراد البيانات من ملف');
      saveState();
      renderContent();
      showToast('✅ تم استيراد البيانات');
    } catch(err) { alert('⚠️ ملف غير صالح'); }
  };
  reader.readAsText(file);
  event.target.value = '';
};

// ─── 16. المزامنة وإشعارات ───
async function syncToServer() {
  try {
    const resp = await fetch('/api/state');
    if(resp.ok) {
      const serverData = await resp.json();
      for(const key of ['patients','tasks','handovers','clinicSlots','teamMembers','teamMessages']) {
        if(serverData[key] && serverData[key].length) {
          const localMap = {}; state[key].forEach(item => { localMap[item.id] = item; });
          serverData[key].forEach(serverItem => {
            const localItem = localMap[serverItem.id];
            if(!localItem || (serverItem.updatedAt||0) > (localItem.updatedAt||0)) {
              state[key] = state[key].filter(i => i.id !== serverItem.id);
              state[key].push(serverItem);
            }
          });
          for(const localItem of state[key]) {
            const serverItem = serverData[key].find(s => s.id === localItem.id);
            if(!serverItem || (localItem.updatedAt||0) > (serverItem.updatedAt||0)) {
              await fetch(`/api/${key}/${localItem.id}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify(localItem) });
            }
          }
        } else {
          for(const item of state[key]) {
            await fetch(`/api/${key}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(item) });
          }
        }
      }
      state.lastSync = Date.now();
      state.isOffline = false;
      document.getElementById('offlineBanner').classList.remove('visible');
      document.getElementById('syncDot').className = 'dot online';
      document.getElementById('syncLabel').textContent = 'متصل';
      saveState();
      showToast('🔄 تمت المزامنة');
    }
  } catch(e) {
    state.isOffline = true;
    document.getElementById('offlineBanner').classList.add('visible');
    document.getElementById('syncDot').className = 'dot offline';
    document.getElementById('syncLabel').textContent = 'محلي';
    console.warn('⚠️ الخادم غير متاح:', e.message);
    setTimeout(syncToServer, 30000);
  }
}

function requestNotificationPermission() {
  if('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
}

function checkTaskReminders() {
  if(!('Notification' in window) || Notification.permission !== 'granted') return;
  const now = new Date();
  state.tasks.filter(t => !t.done && !t.reminded).forEach(t => {
    if(t.dueDate && t.dueTime) {
      const dueDateTime = new Date(`${t.dueDate}T${t.dueTime}`);
      const diffMin = (dueDateTime - now) / 60000;
      if(diffMin > 0 && diffMin <= 30) {
        new Notification('⏰ تذكير بمهمة', {
          body: `${t.text} (مستحقة خلال ${Math.round(diffMin)} دقيقة)`,
          icon: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Ccircle cx="50" cy="50" r="45" fill="%231a73e8"/%3E%3Ctext x="50" y="65" font-size="40" text-anchor="middle" fill="white"%3E%2B%3C/text%3E%3C/svg%3E'
        });
        t.reminded = true;
        saveState();
      }
    }
  });
}

// ─── 17. التهيئة ───
document.addEventListener('DOMContentLoaded', async () => {
  await loadState();
  document.getElementById('roleSelect').value = state.currentRole;
  if(state.currentRole === 'senior') { document.getElementById('adminBtn').classList.add('visible'); document.getElementById('drawerAdminBtn').style.display = 'flex'; }
  renderTabs();
  renderContent();
  requestNotificationPermission();
  setTimeout(syncToServer, 1000);
  setInterval(syncToServer, 300000);
  setInterval(() => { fetch('/api/ping').catch(()=>{}); }, 60000);
  setInterval(checkTaskReminders, 60000);
  console.log('🏥 PaedsWard Workflow جاهز!');
  console.log('👤 الدور:', state.currentRole);
  console.log('👥 المرضى:', state.patients.length);
  console.log('📋 المهام:', state.tasks.length);
});
