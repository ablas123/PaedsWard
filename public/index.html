<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaedsWard – النظام المتكامل لإدارة أجنحة الأطفال</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1e3a8a">
    <link rel="icon" type="image/png" href="/img/icon-192.png">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <header class="app-header">
        <div class="header-main">
            <div class="brand">
                <span class="hospital-logo">🏥</span>
                <h1>PaedsWard <span class="version-badge">v6.0.0</span></h1>
            </div>
            <div class="search-container">
                <input type="text" id="globalSearch" placeholder="بحث شامل (مرضى، مهام، مواعيد، رسائل)...">
                <span class="search-icon">🔍</span>
            </div>
            <div class="user-status-area">
                <div id="connectionStatus" class="status-indicator online" title="حالة الاتصال بالسيرفر"></div>
                <select id="userRoleSelector" class="role-selector">
                    <option value="senior">استشاري / أخصائي (Senior)</option>
                    <option value="junior">طبيب مبتدئ / مقيم (Junior)</option>
                    <option value="nurse">تمريض (Nurse)</option>
                    <option value="admin">مشرف النظام (Admin)</option>
                </select>
            </div>
        </div>

        <div class="quick-dashboard" id="quickDashboard">
            <div class="stat-card" data-type="total">
                <span class="stat-label">إجمالي الأطفال</span>
                <span class="stat-value" id="countTotal">0</span>
            </div>
            <div class="stat-card" data-type="critical">
                <span class="stat-label">حالات حرجة</span>
                <span class="stat-value" id="countCritical">0</span>
            </div>
            <div class="stat-card" data-type="tasks">
                <span class="stat-label">مهام معلقة</span>
                <span class="stat-value" id="countTasks">0</span>
            </div>
            <div class="stat-card" data-type="handover">
                <span class="stat-label">تسليم عاجل</span>
                <span class="stat-value" id="countUrgentHandover">0</span>
            </div>
        </div>
    </header>

    <div class="app-container">
        <nav class="app-navigation" id="appNavigation">
            <button class="nav-btn active" data-target="ward-view">📋 جناح الأطفال</button>
            <button class="nav-btn" data-target="tasks-view">✅ المهام الطبية</button>
            <button class="nav-btn" data-target="handover-view">🔄 تسليم المناوبة (SBAR)</button>
            <button class="nav-btn" data-target="clinic-view">🗓️ العيادة الخارجية</button>
            <button class="nav-btn" data-target="team-view">💬 محادثة الفريق</button>
            <button class="nav-btn" data-target="reports-view">📊 التقارير والتحليل</button>
            <button class="nav-btn" data-target="audit-view">🔍 سجل التدقيق Security</button>
        </nav>

        <main class="app-content" id="appContent">
            
            <section id="ward-view" class="view-section active-view">
                <div class="view-header">
                    <h2>إدارة جناح الأطفال الحالي</h2>
                    <button id="openAdmissionWizardBtn" class="action-btn-primary">➕ قبول طفل جديد (Wizard)</button>
                </div>
                <div class="ward-stages-container" id="wardStagesContainer">
                    </div>
            </section>

            <section id="tasks-view" class="view-section">
                </section>

            <section id="handover-view" class="view-section">
                </section>

            <section id="clinic-view" class="view-section">
                </section>

            <section id="team-view" class="view-section">
                </section>

            <section id="reports-view" class="view-section">
                </section>

            <section id="audit-view" class="view-section">
                </section>

        </main>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box" id="modalBox">
            </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script type="module" src="/js/app.js"></script>
</body>
</html>
