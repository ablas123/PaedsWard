<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoreWard - نظام إدارة العنابر</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background: #f5f7fb; direction: rtl; }
    
    .login-screen { position: fixed; inset: 0; background: linear-gradient(135deg, #1a73e8, #0b3d91); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 1000; }
    .login-card { background: white; border-radius: 16px; padding: 32px 24px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; }
    .login-logo { font-size: 64px; margin-bottom: 8px; }
    .login-title { font-size: 28px; font-weight: 700; color: #0b3d91; margin-bottom: 4px; }
    .login-subtitle { color: #64748b; margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; text-align: right; }
    .form-group label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; }
    .form-group input { width: 100%; padding: 12px 14px; border: 1.5px solid #e2e8f0; border-radius: 6px; font-size: 14px; }
    .form-group input:focus { outline: none; border-color: #1a73e8; }
    .btn { padding: 12px 20px; border-radius: 6px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; }
    .btn-primary { background: #1a73e8; color: white; width: 100%; }
    .btn-primary:hover { background: #0b3d91; }
    .login-error { background: #fee2e2; color: #e53935; padding: 10px; border-radius: 6px; margin-bottom: 12px; display: none; }
    .login-hint { margin-top: 20px; padding: 12px; background: #e8f0fe; border-radius: 6px; font-size: 12px; color: #0b3d91; }
    
    .app { display: none; min-height: 100vh; }
    .app-header { background: linear-gradient(135deg, #1a73e8, #0b3d91); color: white; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .logo { font-size: 28px; }
    .brand-name { font-size: 16px; font-weight: 700; }
    .brand-subtitle { font-size: 11px; opacity: 0.9; }
    .header-right { display: flex; gap: 6px; }
    .icon-btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.15); color: white; font-size: 16px; border: none; cursor: pointer; }
    
    .app-nav { display: flex; background: white; border-bottom: 1px solid #e2e8f0; overflow-x: auto; }
    .nav-tab { flex: 1; min-width: 80px; padding: 10px 6px; display: flex; flex-direction: column; align-items: center; gap: 2px; color: #64748b; font-size: 10px; font-weight: 600; border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; }
    .nav-tab.active { color: #1a73e8; border-bottom-color: #1a73e8; background: #e8f0fe; }
    .tab-icon { font-size: 20px; }
    
    .app-main { flex: 1; padding: 16px; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
    .stat-card { background: white; border-radius: 12px; padding: 14px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-top: 3px solid #1a73e8; }
    .stat-card.info { border-top-color: #06b6d4; }
    .stat-card.danger { border-top-color: #e53935; }
    .stat-card.warning { border-top-color: #f59e0b; }
    .stat-value { font-size: 26px; font-weight: 800; }
    .stat-label { font-size: 11px; color: #64748b; margin-top: 6px; }
    
    .card { background: white; border-radius: 12px; padding: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 10px; border-right: 4px solid #1a73e8; }
    .card-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .card-title { font-size: 15px; font-weight: 700; }
    .card-body { font-size: 13px; line-height: 1.6; color: #475569; }
    
    .empty-state { text-align: center; padding: 40px 20px; color: #64748b; }
    .empty-state-icon { font-size: 48px; margin-bottom: 10px; opacity: 0.5; }
    
    .toast-container { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); z-index: 9999; }
    .toast { background: #1e293b; color: white; padding: 12px 16px; border-radius: 12px; margin-bottom: 8px; }
    .toast.success { background: #22c55e; }
    .toast.error { background: #e53935; }
  </style>
</head>
<body>

  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">🏥</div>
      <h1 class="login-title">CoreWard</h1>
      <p class="login-subtitle">نظام إدارة العنابر الذكي للأطفال</p>
      <form id="loginForm">
        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input type="email" id="loginEmail" required placeholder="admin@ward.com" />
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" id="loginPassword" required placeholder="••••••" />
        </div>
        <div id="loginError" class="login-error"></div>
        <button type="submit" class="btn btn-primary">تسجيل الدخول</button>
      </form>
      <div class="login-hint">
        <strong>حساب المدير:</strong><br>
        admin@ward.com / admin123
      </div>
    </div>
  </div>

  <div id="app" class="app">
    <header class="app-header">
      <div class="header-left">
        <div class="logo">🏥</div>
        <div>
          <div class="brand-name">CoreWard</div>
          <div class="brand-subtitle" id="userBadge">—</div>
        </div>
      </div>
      <div class="header-right">
        <button class="icon-btn" id="btnLogout">🚪</button>
      </div>
    </header>

    <nav class="app-nav" id="appNav"></nav>
    <main class="app-main" id="appMain"></main>
    <div class="toast-container" id="toastContainer"></div>
  </div>

  <script>
    // Simple State Management
    var state = {
      currentUser: null,
      patients: [],
      tasks: []
    };

    // Load from localStorage
    function loadState() {
      var saved = localStorage.getItem('coreward_state');
      if (saved) {
        state = JSON.parse(saved);
      }
    }

    // Save to localStorage
    function saveState() {
      localStorage.setItem('coreward_state', JSON.stringify(state));
    }

    // Login
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var email = document.getElementById('loginEmail').value;
      var password = document.getElementById('loginPassword').value;

      if (email === 'admin@ward.com' && password === 'admin123') {
        state.currentUser = {
          id: 'admin',
          name: 'مدير النظام',
          email: email,
          role: 'director'
        };
        saveState();
        showApp();
        showToast('تم تسجيل الدخول بنجاح!', 'success');
      } else {
        document.getElementById('loginError').textContent = 'بيانات الدخول غير صحيحة';
        document.getElementById('loginError').style.display = 'block';
      }
    });

    // Logout
    document.getElementById('btnLogout').addEventListener('click', function() {
      if (confirm('هل أنت متأكد من تسجيل الخروج؟')) {
        state.currentUser = null;
        saveState();
        showLogin();
      }
    });

    function showLogin() {
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
    }

    function showApp() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('userBadge').textContent = '👑 ' + state.currentUser.name;
      renderTabs();
      switchTab('dashboard');
    }

    function renderTabs() {
      var tabs = [
        { id: 'dashboard', icon: '📊', label: 'الرئيسية' },
        { id: 'ward', icon: '🛏️', label: 'العنبر' },
        { id: 'tasks', icon: '✅', label: 'المهام' }
      ];

      var html = tabs.map(function(tab) {
        return '<button class="nav-tab" data-tab="' + tab.id + '">' +
          '<div class="tab-icon">' + tab.icon + '</div>' +
          '<div>' + tab.label + '</div>' +
          '</button>';
      }).join('');

      document.getElementById('appNav').innerHTML = html;

      document.querySelectorAll('.nav-tab').forEach(function(btn) {
        btn.addEventListener('click', function() {
          switchTab(btn.dataset.tab);
        });
      });
    }

    function switchTab(tabId) {
      document.querySelectorAll('.nav-tab').forEach(function(btn) {
        btn.classList.toggle('active', btn.dataset.tab === tabId);
      });

      if (tabId === 'dashboard') renderDashboard();
      else if (tabId === 'ward') renderWard();
      else if (tabId === 'tasks') renderTasks();
    }

    function renderDashboard() {
      var activePatients = state.patients.filter(function(p) { return p.status !== 'discharged'; }).length;
      var criticalPatients = state.patients.filter(function(p) { return p.status === 'critical'; }).length;
      var pendingTasks = state.tasks.filter(function(t) { return !t.completed; }).length;

      var html = '<div class="stats-grid">' +
        '<div class="stat-card"><div class="stat-value">' + state.patients.length + '</div><div class="stat-label">إجمالي المرضى</div></div>' +
        '<div class="stat-card info"><div class="stat-value">' + activePatients + '</div><div class="stat-label">مرضى نشطون</div></div>' +
        '<div class="stat-card danger"><div class="stat-value">' + criticalPatients + '</div><div class="stat-label">حالات حرجة</div></div>' +
        '<div class="stat-card warning"><div class="stat-value">' + pendingTasks + '</div><div class="stat-label">مهام معلقة</div></div>' +
        '</div>';

      document.getElementById('appMain').innerHTML = html;
    }

    function renderWard() {
      if (state.patients.length === 0) {
        document.getElementById('appMain').innerHTML = '<div class="empty-state">' +
          '<div class="empty-state-icon">🛏️</div>' +
          '<div>لا توجد مرضى حالياً</div>' +
          '<button class="btn btn-primary" style="margin-top:16px;" onclick="addPatient()">إضافة مريض</button>' +
          '</div>';
        return;
      }

      var html = state.patients.map(function(p) {
        return '<div class="card">' +
          '<div class="card-header"><div class="card-title">' + p.name + '</div></div>' +
          '<div class="card-body">' +
          '<div>العمر: ' + (p.age || '—') + ' سنة</div>' +
          '<div>التشخيص: ' + (p.diagnosis || '—') + '</div>' +
          '<div>السرير: ' + (p.bed || '—') + '</div>' +
          '</div></div>';
      }).join('');

      document.getElementById('appMain').innerHTML = html;
    }

    function renderTasks() {
      if (state.tasks.length === 0) {
        document.getElementById('appMain').innerHTML = '<div class="empty-state">' +
          '<div class="empty-state-icon">✅</div>' +
          '<div>لا توجد مهام حالياً</div>' +
          '<button class="btn btn-primary" style="margin-top:16px;" onclick="addTask()">إضافة مهمة</button>' +
          '</div>';
        return;
      }

      var html = state.tasks.map(function(t) {
        return '<div class="card">' +
          '<div class="card-header"><div class="card-title">' + t.description + '</div></div>' +
          '<div class="card-body">' +
          '<div>الموعد: ' + (t.dueDate || '—') + '</div>' +
          '<div>الأولوية: ' + (t.priority || '—') + '</div>' +
          '</div></div>';
      }).join('');

      document.getElementById('appMain').innerHTML = html;
    }

    function addPatient() {
      var name = prompt('اسم المريض:');
      if (!name) return;
      var age = prompt('العمر:');
      var diagnosis = prompt('التشخيص:');
      var bed = prompt('رقم السرير:');

      state.patients.push({
        id: Date.now().toString(),
        name: name,
        age: age,
        diagnosis: diagnosis,
        bed: bed,
        status: 'stable',
        createdAt: new Date().toISOString()
      });
      saveState();
      renderWard();
      showToast('تم إضافة المريض!', 'success');
    }

    function addTask() {
      var description = prompt('وصف المهمة:');
      if (!description) return;
      var dueDate = prompt('تاريخ الاستحقاق (YYYY-MM-DD):');
      var priority = prompt('الأولوية (high/medium/low):');

      state.tasks.push({
        id: Date.now().toString(),
        description: description,
        dueDate: dueDate,
        priority: priority,
        completed: false
      });
      saveState();
      renderTasks();
      showToast('تم إضافة المهمة!', 'success');
    }

    function showToast(message, type) {
      var container = document.getElementById('toastContainer');
      var toast = document.createElement('div');
      toast.className = 'toast ' + (type || 'info');
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(function() { toast.remove(); }, 3000);
    }

    // Initialize
    loadState();
    if (state.currentUser) {
      showApp();
    }
  </script>
</body>
</html>
