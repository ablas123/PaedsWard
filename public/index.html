<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🏥 PaedsWard – النظام الاحترافي</title>
  <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22PaedsWard%22%2C%22short_name%22%3A%22PaedsWard%22%2C%22start_url%22%3A%22.%2Findex.html%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f0f4f8%22%2C%22theme_color%22%3A%22%231a73e8%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20100%20100'%3E%3Ccircle%20cx%3D'50'%20cy%3D'50'%20r%3D'45'%20fill%3D'%231a73e8'%2F%3E%3Ctext%20x%3D'50'%20y%3D'65'%20font-size%3D'40'%20text-anchor%3D'middle'%20fill%3D'white'%3E%2B%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22100x100%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
</head>
<body>

  <!-- وعاء الرسائل التنبيهية (Toast) -->
  <div id="toastContainer"></div>

  <!-- شاشة تسجيل الدخول (محسنة) -->
  <div id="loginScreen" class="login-screen">
    <div class="login-box">
      <div style="text-align:center;font-size:56px;margin-bottom:4px;">🏥</div>
      <h2>🔐 تسجيل الدخول</h2>
      <p style="color:var(--gray);font-size:13px;margin-bottom:16px;">نظام إدارة أجنحة الأطفال</p>
      <label>البريد الإلكتروني</label>
      <input type="email" id="loginEmail" placeholder="example@ward.com" value="admin@ward.com">
      <label>كلمة المرور</label>
      <input type="password" id="loginPassword" placeholder="••••••••" value="admin123">
      <button onclick="handleLogin()" class="block" style="margin-top:8px;">دخول</button>
      <div style="display:flex;gap:8px;margin-top:8px;">
        <button onclick="showRegisterForm()" class="secondary block" style="flex:1;">📝 إنشاء حساب</button>
      </div>
      <p style="font-size:12px;color:var(--gray);margin-top:12px;">
        🔑 تجريبي: admin@ward.com / admin123
      </p>
    </div>
  </div>

  <!-- التطبيق الرئيسي -->
  <div id="app" style="display:none;flex-direction:column;min-height:100vh;">
    <header id="appHeader"></header>
    <main id="appContent"></main>
    <nav id="appNav"></nav>
  </div>

  <!-- نافذة منبثقة (Modal) -->
  <div id="modal" class="modal hidden">
    <div class="modal-content" id="modalContent"></div>
  </div>

  <!-- JavaScript -->
  <script src="js/core/EventBus.js"></script>
  <script src="js/core/constants.js"></script>
  <script src="js/core/StateManager.js"></script>
  <script src="js/components/Dashboard.js"></script>
  <script src="js/components/WardComponent.js"></script>
  <script src="js/components/TasksComponent.js"></script>
  <script src="js/components/ClinicComponent.js"></script>
  <script src="js/components/TeamComponent.js"></script>
  <script src="js/components/SbarHandover.js"></script>
  <script src="js/components/AuditLog.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
