<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a73e8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="CoreWard - نظام إدارة العنابر الذكي للأطفال" />

  <title>CoreWard - نظام إدارة العنابر</title>

  <!-- PWA Manifest (inline data URI) -->
  <link rel="manifest" href='data:application/manifest+json;charset=utf-8,{
    "name": "CoreWard - نظام إدارة العنابر",
    "short_name": "CoreWard",
    "start_url": "/",
    "display": "standalone",
    "background_color": "%23ffffff",
    "theme_color": "%231a73e8",
    "orientation": "portrait",
    "lang": "ar",
    "dir": "rtl",
    "icons": [
      {
        "src": "data:image/svg+xml;charset=utf-8,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 192 192%27%3E%3Crect width=%27192%27 height=%27192%27 rx=%2732%27 fill=%27%231a73e8%27/%3E%3Ctext x=%2796%27 y=%27120%27 font-size=%27100%27 text-anchor=%27middle%27 fill=%27white%27%3E%F0%9F%8F%A5%3C/text%3E%3C/svg%3E",
        "sizes": "192x192",
        "type": "image/svg+xml",
        "purpose": "any maskable"
      }
    ]
  }' />

  <!-- Favicon (inline SVG) -->
  <link rel="icon" href='data:image/svg+xml;charset=utf-8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%231a73e8"/><text x="50" y="70" font-size="60" text-anchor="middle" fill="white">🏥</text></svg>' />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- ============ Login Screen ============ -->
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">🏥</div>
      <h1 class="login-title">CoreWard</h1>
      <p class="login-subtitle">نظام إدارة العنابر الذكي للأطفال</p>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="loginEmail">البريد الإلكتروني</label>
          <input type="email" id="loginEmail" required autocomplete="username" placeholder="admin@ward.com" />
        </div>
        <div class="form-group">
          <label for="loginPassword">كلمة المرور</label>
          <input type="password" id="loginPassword" required autocomplete="current-password" placeholder="••••••" />
        </div>
        <div id="loginError" class="login-error" style="display:none;"></div>
        <button type="submit" class="btn btn-primary btn-block">
          <span class="btn-text">تسجيل الدخول</span>
          <span class="btn-loader" style="display:none;">⏳</span>
        </button>
      </form>

      <div class="login-hint">
        <strong>حساب المدير:</strong><br />
        admin@ward.com / admin123
      </div>
    </div>
  </div>

  <!-- ============ Main App ============ -->
  <div id="app" class="app" style="display:none;">

    <!-- Header -->
    <header class="app-header">
      <div class="header-left">
        <div class="logo">🏥</div>
        <div class="brand">
          <div class="brand-name">CoreWard</div>
          <div class="brand-subtitle" id="userBadge">—</div>
        </div>
      </div>
      <div class="header-right">
        <div class="connection-status" id="connectionStatus">
          <span class="status-dot online"></span>
          <span class="status-text">متصل</span>
        </div>
        <button class="icon-btn" id="btnSync" title="مزامنة">🔄</button>
        <button class="icon-btn" id="btnExport" title="تصدير البيانات">📤</button>
        <button class="icon-btn" id="btnImport" title="استيراد البيانات">📥</button>
        <input type="file" id="importFile" accept=".json" style="display:none;" />
        <button class="icon-btn" id="btnLogout" title="تسجيل الخروج">🚪</button>
      </div>
    </header>

    <!-- Global Search -->
    <div class="search-bar">
      <input type="text" id="globalSearch" placeholder="🔍 بحث عام عن مريض، مهمة، ملاحظة..." />
    </div>

    <!-- Navigation Tabs -->
    <nav class="app-nav" id="appNav">
      <!-- Tabs will be rendered by app.js -->
    </nav>

    <!-- Main Content -->
    <main class="app-main" id="appMain">
      <!-- Components render here -->
    </main>

    <!-- Floating Action Button -->
    <button class="fab" id="fab" style="display:none;">➕</button>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Modal Container -->
    <div class="modal-container" id="modalContainer"></div>

  </div>

  <!-- ============ Scripts ============ -->
  <script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
  <script src="/js/core/EventBus.js"></script>
  <script src="/js/core/constants.js"></script>
  <script src="/js/core/StateManager.js"></script>
  <script src="/js/components/Dashboard.js"></script>
  <script src="/js/components/WardComponent.js"></script>
  <script src="/js/components/TasksComponent.js"></script>
  <script src="/js/components/ClinicComponent.js"></script>
  <script src="/js/components/TeamComponent.js"></script>
  <script src="/js/components/SbarHandover.js"></script>
  <script src="/js/components/AuditLog.js"></script>
  <script src="/js/app.js"></script>
  <script>
    // Service Worker Registration (PWA)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(err => {
          console.warn('SW registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
